    <style>
        /* 扩展样式 */
        .sidebar {
            overflow-y: auto;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            line-height: 1.3;
        }

        .concept-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .concept-btn {
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--accent-red);
            background: #fff;
            color: var(--accent-red);
            font-family: var(--font-family);
            text-align: center;
        }

        .concept-btn.active {
            background: var(--accent-red);
            color: #fff;
        }

        .concept-btn:hover:not(.active) {
            background: rgba(214, 59, 29, 0.1);
        }

        select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(139, 0, 0, 0.2);
            background: #fff;
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 0.9rem;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-red);
        }

        .result-display {
            background: rgba(255, 255, 255, 0.6);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-primary);
            border: 1px solid rgba(139, 0, 0, 0.1);
            max-height: 180px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .result-display strong {
            color: var(--accent-red);
            display: block;
            margin-bottom: 0.5rem;
        }

        .result-display .cut-vertex {
            display: inline-block;
            background: rgba(214, 59, 29, 0.15);
            padding: 2px 8px;
            border-radius: 6px;
            margin: 2px;
            font-weight: 600;
            color: var(--accent-red);
        }

        .result-display .cut-edge {
            display: inline-block;
            background: rgba(255, 180, 0, 0.15);
            padding: 2px 8px;
            border-radius: 6px;
            margin: 2px;
            font-weight: 600;
            color: var(--accent-gold);
        }

        /* 右侧面板 */
        .glass-pane {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1rem;
            padding: 1rem;
        }

        .graph-canvas {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .info-panel-right {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .concept-explanation {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(139, 0, 0, 0.1);
        }

        .concept-explanation h3 {
            font-family: var(--font-title);
            font-size: 1.1rem;
            color: var(--accent-red);
            margin-bottom: 0.8rem;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 0.5rem;
        }

        .concept-explanation p {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .concept-explanation .formula {
            background: rgba(139, 0, 0, 0.05);
            padding: 0.5rem;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--accent-red);
            margin: 0.5rem 0;
        }

        .steps-panel {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 1rem;
            overflow-y: auto;
            border: 1px solid rgba(139, 0, 0, 0.1);
            flex: 1;
        }

        .steps-panel h3 {
            font-family: var(--font-title);
            font-size: 1.1rem;
            color: var(--accent-red);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 0.5rem;
        }

        .step-item {
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            border-left: 3px solid var(--text-secondary);
            font-size: 0.8rem;
            line-height: 1.5;
            transition: all 0.2s ease;
        }

        .step-item.active {
            background: rgba(214, 59, 29, 0.15);
            border-left-color: var(--accent-red);
            font-weight: 600;
        }

        .step-item .step-num {
            display: inline-block;
            background: var(--accent-red);
            color: #fff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            text-align: center;
            line-height: 20px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            font-weight: 600;
        }

        .step-item.active .step-num {
            background: var(--accent-gold);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* 节点特殊状态 */
        .node-group.cut-vertex .node-circle {
            fill: #ff6b6b;
            stroke: #d32f2f;
            stroke-width: 4px;
            filter: drop-shadow(0px 0px 8px rgba(211, 47, 47, 0.5));
        }

        .node-group.cut-vertex .node-text {
            fill: white;
            font-weight: 700;
        }

        .edge-line.cut-edge {
            stroke: var(--accent-gold);
            stroke-width: 4px;
            stroke-dasharray: 8, 4;
            animation: dashMove 1s linear infinite;
        }

        @keyframes dashMove {
            to { stroke-dashoffset: -12; }
        }

        .node-group.checking .node-circle {
            fill: var(--accent-gold);
            stroke: var(--accent-gold);
            animation: checkPulse 1.5s infinite;
        }

        @keyframes checkPulse {
            0%, 100% { r: 25; opacity: 1; }
            50% { r: 28; opacity: 0.8; }
        }

        /* 连通分量高亮 */
        .component-1 .node-circle { fill: #ffcdd2; stroke: #d32f2f; }
        .component-2 .node-circle { fill: #c8e6c9; stroke: #388e3c; }
        .component-3 .node-circle { fill: #bbdefb; stroke: #1976d2; }
        .component-4 .node-circle { fill: #fff9c4; stroke: #fbc02d; }

                grid-template-columns: 1fr;
            }
            .info-panel-right {
                max-height: 400px;
                overflow-y: auto;
            }
