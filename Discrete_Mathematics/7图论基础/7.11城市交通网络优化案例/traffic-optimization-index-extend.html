  function renderMatrix() {
    const n = 6, style = val("style"), k = val("k"), directed = val("directed");
    const g = drawGraph({ n, style, directed });
    const a = adjacency(n, g.edges, directed);
    const mat = PROFILE.params.mode === "reachability" ? reachability(a, k) : a;
    const ones = mat.flat().reduce((s, x) => s + x, 0);
    note('<b>矩阵表示：</b>' + (PROFILE.params.mode === "reachability" ? 'R(k) 记录 k 步内可达关系。' : 'A[i][j]=1 表示 i 与 j 相邻。') + '<br>' + matrixHtml(mat));
    setResult((PROFILE.params.mode === "reachability" ? "R_" + k : "A") + " 非零元=" + ones, chip(true, "已矩阵化"), "矩阵把复杂关系转化为可计算数据，帮助我们精准把握系统。");
  }

  function setupShortest() {
    controls.innerHTML =
      rangeControl("target", "目标节点", PROFILE.params.mode === "routing" ? 6 : 5, 1, 7, 1, "从 A 出发")
      + rangeControl("congestion", "拥堵/风险系数", PROFILE.params.mode === "routing" ? 3 : 1, 1, 5, 1, "改变权重");
    renderShortest();
  }
  function renderShortest() {
    const n = 8, target = Math.min(val("target"), n - 1), congestion = val("congestion");
    const edges = baseEdges("cluster", n).map(e => ({...e}));
    edges.forEach(e => { if ((e.u === 1 && e.v === 6) || (e.u === 2 && e.v === 4)) e.w += congestion; });
    const res = dijkstra(n, edges, target);
    drawGraph({ n, style: "cluster", edges, weighted: true, highlightNodes: res.path, highlightEdges: res.edgesPath });
    note('<b>最短路：</b>A → ' + res.path.map(i => String.fromCharCode(65 + i)).join(" → ") + '，总权重=' + res.dist[target] + '。拥堵会改变“最短”的含义。');
    setResult("dist(A," + String.fromCharCode(65 + target) + ")=" + res.dist[target], chip(true, "路径已优化"), "全局最优来自每一步可靠选择，也来自对实时条件的准确把握。");
  }

  function setupCritical() {
    controls.innerHTML =
      selectControl("action", "扰动方式", [["none", "保持原网"], ["removeNode", "移除关键点 C"], ["removeEdge", "移除桥边 C-D"], ["repair", "添加备用边 B-F"]], PROFILE.params.mode === "robust" ? "repair" : "removeNode", "风险测试");
    renderCritical();
  }
  function renderCritical() {
    const action = val("action"), n = 7;
    let edges = baseEdges("path", n).concat([{u:1,v:3,w:1},{u:3,v:5,w:1}]);
    let removeNode = action === "removeNode" ? 2 : -1;
    let removedEdges = action === "removeEdge" ? ["2-3"] : [];
    let highlight = [];
    if (action === "repair") { edges.push({u:1,v:5,w:1}); highlight.push("1-5"); }
    const g = drawGraph({ n, style: "path", edges, removeNode, removedEdges, highlightEdges: highlight });
    const effective = g.edges.filter(e => !removedEdges.includes(edgeKey(e)));
    const comps = components(n, effective, removeNode);
    note('<b>风险观察：</b>扰动后连通分支=' + comps + '。' + (comps > 1 ? '出现单点脆弱或桥风险。' : '网络仍保持连通，冗余路径发挥作用。'));
    setResult("components after action=" + comps, chip(comps === 1, comps === 1 ? "韧性较好" : "存在风险"), "居安思危，就是提前识别割点与桥，补齐系统短板。");
  }

  function setupCase() {
    const mode = PROFILE.params.mode;
    controls.innerHTML =
      rangeControl("target", mode.includes("city") || mode === "coordination" ? "服务目标节点" : "目标节点", mode === "rescue" || mode === "emergency" ? 6 : 5, 1, 7, 1, "从中心 A 出发")
      + rangeControl("pressure", mode === "traffic" || mode === "signal" ? "拥堵压力" : mode === "manufacturing" || mode === "bottleneck" ? "工序节拍压力" : mode === "rescue" || mode === "emergency" ? "道路风险" : "协同强度", mode.includes("coordination") ? 2 : 3, 1, 5, 1, "情境参数")
      + checkControl("optimize", "启用优化/协同方案", mode === "emergency" || mode === "signal" || mode === "bottleneck" || mode === "coordination", "改进策略");
    renderCase();
  }
  function renderCase() {
    const mode = PROFILE.params.mode, n = 8, target = Math.min(val("target"), n - 1), pressure = val("pressure"), optimize = val("optimize");
    const style = mode === "manufacturing" || mode === "bottleneck" ? "dag" : "cluster";
    let edges = baseEdges(style, n).map(e => ({...e}));
    edges.forEach(e => {
      if (mode === "traffic" || mode === "signal") e.w += (e.u + e.v) % 3 === 0 ? pressure : 0;
      if (mode === "rescue" || mode === "emergency") e.w += (e.u === 1 || e.v === 6) ? pressure : 0;
      if (mode === "manufacturing" || mode === "bottleneck") e.w += (e.v === 5) ? pressure : 0;
      if (mode === "city" || mode === "coordination") e.w += optimize ? 0 : ((e.u + e.v) % 4 === 0 ? pressure : 0);
    });
    if (optimize) edges.push({u:1,v:6,w:2});
    const res = dijkstra(n, edges, target);
    drawGraph({ n, style, layout: style === "dag" ? "dag" : "cluster", directed: style === "dag", weighted: true, highlightNodes: res.path, highlightEdges: res.edgesPath });
    const labels = {
      rescue: "救援最快路径", emergency: "多点救援调度", traffic: "通行优化路径", signal: "信号协同路径",
      manufacturing: "工序关键链", bottleneck: "瓶颈优化链", city: "城市服务链", coordination: "跨部门协同链"
    };
    note('<b>' + esc(labels[mode] || "案例网络") + '：</b>A → ' + res.path.map(i => String.fromCharCode(65 + i)).join(" → ") + '，综合权重=' + res.dist[target] + '。' + (optimize ? '已启用协同优化方案。' : '当前按原始网络运行。'));
    setResult((labels[mode] || "case") + " weight=" + res.dist[target], chip(true, optimize ? "已优化" : "已分析"), "已完成网络路径与权重分析。");
  }

  function render() {
    const family = PROFILE.family;
    if (family === "graph") renderGraph();
    else if (family === "degree") renderDegree();
    else if (family === "iso") renderIso();
    else if (family === "gallery") renderGallery();
    else if (family === "ops") renderOps();
    else if (family === "connectivity") renderConnectivity();
    else if (family === "matrix") renderMatrix();
    else if (family === "shortest") renderShortest();
    else if (family === "critical") renderCritical();
    else if (family === "case") renderCase();
  }
  function init() {
    const family = PROFILE.family;
    if (family === "graph") setupGraph();
    else if (family === "degree") setupDegree();
    else if (family === "iso") setupIso();
    else if (family === "gallery") setupGallery();
    else if (family === "ops") setupOps();
    else if (family === "connectivity") setupConnectivity();
    else if (family === "matrix") setupMatrix();
    else if (family === "shortest") setupShortest();
    else if (family === "critical") setupCritical();
    else if (family === "case") setupCase();
    controls.addEventListener("input", render);
    controls.addEventListener("change", render);
  }
  window.addEventListener("resize", render);
  init();
})();

  </script>
  <script src="traffic-optimization-case-interactive.js"></script>
  <script src="../../shared/ai-tutor.js" defer></script>
</body>
