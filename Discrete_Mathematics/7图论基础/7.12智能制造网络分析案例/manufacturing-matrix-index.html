        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"
       onmouseout="this.style.background='rgba(30,30,40,0.82)'">
        🏠 <span>课程主页</span>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <h1>红色数理 <span class="highlight">进阶层</span></h1>
                <p class="subtitle">制造工序网络图 · 网络分析</p>
            </div>

            <div class="controls-wrapper">
                <div class="control-group">
                    <label>选择矩阵类型</label>
                    <div class="matrix-tabs">
                        <button class="tab-btn active" data-tab="adjacency" aria-label="邻接矩阵 (Adjacency)">邻接矩阵</button>
                        <button class="tab-btn" data-tab="incidence" aria-label="关联矩阵 (Incidence)">关联矩阵</button>
                    </div>
                </div>

                <div class="analysis-info">
                    <div class="info-group">
                        <label>网络复杂度</label>
                        <div class="stats-row">
                            <div class="stat-item">
                                <span class="label">节点数 (V)</span>
                                <span id="nodeCount" class="value">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="label">边数 (E)</span>
                                <span id="edgeCount" class="value">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="label">密度</span>
                                <span id="density" class="value">0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="info-panel info-box">
                    <h3>工匠精神</h3>
                    <div id="conceptInfo">
                        <p><strong>邻接矩阵:</strong> 点击单元格 (0/1) 可直接添加或删除连线。</p>
                        <p><strong>关联矩阵:</strong> 左键设为起点(1)，右键设为终点(-1)，自由重组物流路径。</p>
                        <p><strong>精益求精:</strong> 通过数学工具不断打磨网络结构，追求极致效率。</p>
                    </div>
                </div>
            </div>

            <div class="actions-footer controls-area">
                <button id="optimizeBtn" class="apple-btn primary-btn" aria-label="网络结构优化">
                    <span class="icon">⚡</span> 网络结构优化
                </button>
                <button id="resetBtn" class="apple-btn secondary-btn" aria-label="重置系统 (随机生成)">
                    <span class="icon">🔄</span> 重置系统
                </button>
            </div>
        </aside>

        <main class="visualizer-stage">
            <div class="glass-pane">
                <div class="visualization-container">
                    <section class="section topology-section">
                        <div class="graph-title">
                            <h2>制造单元拓扑图</h2>
                            <p>Manufacturing Unit Topology</p>
                        </div>

                        <div class="topology-canvas">
                            <div class="grid-bg"></div>
                            <div class="legend">
                                <div class="legend-item">
                                    <span class="legend-dot unit"></span>
                                    <span>制造单元 (可拖拽)</span>
                                </div>
                                <div class="legend-item">
                                    <span class="legend-line flow"></span>
                                    <span>物流路径</span>
                                </div>
                                <div class="legend-item">
                                    <span class="legend-line optimized"></span>
                                    <span>优化路径</span>
                                </div>
                            </div>

                            <svg id="graphSvg" width="100%" height="100%" viewBox="0 0 900 460" preserveAspectRatio="xMidYMid meet">
                                <defs>
                                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                        <feGaussianBlur stdDeviation="2" result="blur" />
                                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                    </filter>
                                    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                        <polygon points="0 0, 10 3.5, 0 7" fill="var(--edge-default)" />
                                    </marker>
                                    <marker id="arrow-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                        <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent-blue)" />
                                    </marker>
                                </defs>
                                <g id="edgesGroup"></g>
                                <g id="nodesGroup"></g>
                            </svg>
                        </div>
                    </section>

                    <section class="section matrix-section">
                        <h2 class="section-title">图矩阵联动分析</h2>
                        <div class="matrix-content">
                            <div id="matrixContainer" class="matrix-container">
                                <!-- Matrix will be generated here -->
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>
