    <meta charset="UTF-8">

</head>

<body>
    <!-- 返回主页浮动按钮 (auto-injected) -->
    <a href="../../index.html" title="返回课程主页" style="
        position:fixed;top:14px;left:14px;z-index:9999;
        display:flex;align-items:center;gap:6px;
        background:rgba(30,30,40,0.82);color:#fff;
        padding:7px 14px 7px 10px;border-radius:20px;
        font-size:13px;font-family:'Noto Serif SC',serif;
        text-decoration:none;backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 2px 12px rgba(0,0,0,0.35);
        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"
       onmouseout="this.style.background='rgba(30,30,40,0.82)'">
        🏠 <span>课程主页</span>
    </a>

    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <h1>红色数理 <span class="highlight">进阶层</span></h1>
                <p class="subtitle">图模型搭建器 · 图的基本概念</p>
            </div>
            <div class="connection-badge">
                <span class="badge-icon">🤝</span>
                <span class="badge-text">连接·团结·协作</span>
            </div>
        </header>

        <main class="main-stage">
            <!-- Left Panel: Graph Types -->
            <aside class="left-panel">
                <div class="panel-section">
                    <div class="panel-header">
                        <span class="panel-icon">📊</span>
                        <h3>图的分类</h3>
                    </div>
                    <div class="graph-types">
                        <button class="type-btn active" data-type="undirected" aria-label="⭕ 无向图">
                            <span class="type-icon">⭕</span>
                            <span class="type-name">无向图</span>
                        </button>
                        <button class="type-btn" data-type="directed" aria-label="有向图">
                            <span class="type-icon">➡️</span>
                            <span class="type-name">有向图</span>
                        </button>
                        <button class="type-btn" data-type="mixed" aria-label="混合图">
                            <span class="type-icon">🔄</span>
                            <span class="type-name">混合图</span>
                        </button>
                        <button class="type-btn" data-type="weighted" aria-label="加权图">
                            <span class="type-icon">⚖️</span>
                            <span class="type-name">加权图</span>
                        </button>
                        <button class="type-btn" data-type="null" aria-label="零图">
                            <span class="type-icon">⚪</span>
                            <span class="type-name">零图</span>
                        </button>
                        <button class="type-btn" data-type="trivial" aria-label="平凡图">
                            <span class="type-icon">🔵</span>
                            <span class="type-name">平凡图</span>
                        </button>
                        <button class="type-btn" data-type="multi" aria-label="多重图">
                            <span class="type-icon">🔗</span>
                            <span class="type-name">多重图</span>
                        </button>
                    </div>
                </div>

                <div class="panel-section">
                    <div class="panel-header">
                        <span class="panel-icon">🚩</span>
                        <h3>价值启示</h3>
                    </div>
                    <div class="ideology-content" id="ideologyContent">
                        <h4>🤝 团结协作的网络</h4>
                        <p>图论中的"图"就像人类社会的网络，每个节点代表个体，每条边代表连接。</p>
                        <p>只有团结协作，才能构建和谐稳定的社会网络。</p>
                    </div>
                </div>

                <div class="panel-section">
                    <div class="panel-header">
                        <span class="panel-icon">🎮</span>
                        <h3>互动操作</h3>
                    </div>
                    <div class="controls">
                        <button id="addNodeBtn" class="control-btn" aria-label="添加节点">➕ 添加节点</button>
                        <button id="addEdgeBtn" class="control-btn" aria-label="添加边">🔗 添加边</button>
                        <button id="clearBtn" class="control-btn" aria-label="清空">🗑️ 清空</button>
                        <button id="randomBtn" class="control-btn" aria-label="随机生成">🎲 随机生成</button>
                    </div>
                </div>
            </aside>

            <!-- Center: Graph Canvas -->
            <div class="center-panel">
                <div class="canvas-header">
                    <h2 id="graphTitle">无向图 - 平等互联</h2>
                    <div class="canvas-stats">
                        <span class="stat">节点: <strong id="nodeCount">0</strong></span>
                        <span class="stat">边: <strong id="edgeCount">0</strong></span>
                    </div>
                </div>

                <div class="canvas-container">
                    <canvas id="graphCanvas"></canvas>
                    <div class="canvas-hint" id="canvasHint">
                        点击画布添加节点，点击两个节点之间添加连接
                    </div>
                </div>

                <div class="definition-box" id="definitionBox">
                    <!-- Definition will be injected by JS -->
                </div>
            </div>

            <!-- Right Panel: Properties & Examples -->
            <aside class="right-panel">
                <div class="panel-section">
                    <div class="panel-header">
                        <span class="panel-icon">📐</span>
                        <h3>数学定义</h3>
                    </div>
                    <div class="math-definition" id="mathDefinition">
                        <!-- Math definition will be injected by JS -->
                    </div>
                </div>

                <div class="panel-section">
                    <div class="panel-header">
                        <span class="panel-icon">🌍</span>
                        <h3>现实应用</h3>
                    </div>
                    <div class="application-list" id="applicationList">
                        <!-- Applications will be injected by JS -->
                    </div>
                </div>

                <div class="panel-section">
                    <div class="panel-header">
                        <span class="panel-icon">💡</span>
                        <h3>关键特性</h3>
                    </div>
                    <div class="properties-list" id="propertiesList">
                        <!-- Properties will be injected by JS -->
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        (function () {
            var header = document.querySelector('.main-header');
            var leftPanel = document.querySelector('main.main-stage > .left-panel');
            var anchor = header && (header.querySelector('.connection-badge') || header.querySelector('.header-content'));
            if (leftPanel && header && anchor) {
                var prioritySections = Array.prototype.slice.call(leftPanel.querySelectorAll(':scope > .panel-section')).filter(function (section) {
                    var title = section.querySelector('.panel-header h3');
                    return title && /图的分类|价值启示|互动操作/.test(title.textContent);
                });
                prioritySections.reverse().forEach(function (section) {
                    section.classList.add('left-priority-panel');
                    anchor.insertAdjacentElement('afterend', section);
                });
            }
        })();
    </script>
    <script src="graph_theory.js"></script>
