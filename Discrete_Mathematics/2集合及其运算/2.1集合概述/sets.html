                    <div class="ops-grid">

                        <button class="apple-btn op-btn" data-op="diffA" aria-label="差集 (A-B)">差集 (A-B)</button>

                            <defs>
                                <!-- Clip to circle A -->
                                <clipPath id="vClipA">
                                    <circle cx="150" cy="150" r="148"/>
                                </clipPath>
                                <!-- Mask: A minus B -->
                                <mask id="vMaskAonly">
                                    <rect width="500" height="310" fill="white"/>
                                    <circle cx="350" cy="150" r="148" fill="black"/>
                                </mask>
                                <!-- Mask: B minus A -->
                                <mask id="vMaskBonly">
                                    <rect width="500" height="310" fill="white"/>
                                    <circle cx="150" cy="150" r="148" fill="black"/>
                                </mask>
                            </defs>

                            <!-- Base fills -->
                            <circle cx="150" cy="150" r="148" fill="rgba(214,59,29,0.05)"/>
                            <circle cx="350" cy="150" r="148" fill="rgba(214,59,29,0.05)"/>

                            <!-- Highlight regions (opacity controlled by JS) -->
                            <circle id="svgHlA" cx="150" cy="150" r="148"
                                    fill="rgba(214,59,29,0.30)" mask="url(#vMaskAonly)"
                                    style="opacity:0;transition:opacity 0.35s ease;pointer-events:none"/>
                            <circle id="svgHlI" cx="350" cy="150" r="148"
                                    fill="rgba(255,180,0,0.60)" clip-path="url(#vClipA)"
                                    style="opacity:0;transition:opacity 0.35s ease;pointer-events:none"/>
                            <circle id="svgHlB" cx="350" cy="150" r="148"
                                    fill="rgba(214,59,29,0.30)" mask="url(#vMaskBonly)"
                                    style="opacity:0;transition:opacity 0.35s ease;pointer-events:none"/>

                            <!-- Drag-over feedback -->
                            <circle id="svgDragA" cx="150" cy="150" r="148"
                                    fill="rgba(214,59,29,0.14)"
                                    style="opacity:0;transition:opacity 0.15s ease;pointer-events:none"/>
                            <circle id="svgDragB" cx="350" cy="150" r="148"
                                    fill="rgba(214,59,29,0.14)"
                                    style="opacity:0;transition:opacity 0.15s ease;pointer-events:none"/>

                            <!-- Circle outlines -->
                            <circle cx="150" cy="150" r="148" fill="none"
                                    stroke="rgba(139,0,0,0.40)" stroke-width="2.5"/>
                            <circle cx="350" cy="150" r="148" fill="none"
                                    stroke="rgba(139,0,0,0.40)" stroke-width="2.5"/>
                        </svg>

                        <!-- Drop zones (transparent, handle DnD events) -->
                        <div id="setA" class="venn-circle set-a" aria-label="集合A拖放区">
                            <span class="set-label">集合 A (工)</span>
                            <div class="set-content"></div>
                        </div>
                        <div id="setB" class="venn-circle set-b" aria-label="集合B拖放区">
                            <span class="set-label">集合 B (农)</span>
                            <div class="set-content"></div>
                        </div>

                        <!-- Intersection element zone -->
                        <div id="setIntersect" class="venn-intersect"></div>
                    </div>

                    <!-- Operation label shown below diagram -->
                    <div id="opLabel" class="op-label hidden"></div>
                </div>

                <div id="resultBadge" class="result-badge hidden">
                    <span id="resultText">大团结</span>
