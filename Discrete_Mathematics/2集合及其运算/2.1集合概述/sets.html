<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色数理 - 集合论</title>
    <meta name="description" content="离散数学课程 - 红色数理 - 集合论">

    <link rel="stylesheet" href="sets.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- 返回主页浮动按钮 (auto-injected) -->
    <a href="../../index.html" title="返回课程主页" style="
        position:fixed;top:14px;left:14px;z-index:9999;
        display:flex;align-items:center;gap:6px;
        background:rgba(30,30,40,0.82);color:#fff;
        padding:7px 14px 7px 10px;border-radius:20px;
        font-size:13px;font-family:'Noto Serif SC',serif;
        text-decoration:none;backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 2px 12px rgba(0,0,0,0.35);
        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"
       onmouseout="this.style.background='rgba(30,30,40,0.82)'">
        🏠 <span>课程主页</span>
    </a>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <h1>红色数理 <span class="highlight">集合论</span></h1>
                <p class="subtitle">Unity & Relationships</p>
            </div>

            <div class="controls-wrapper">
                <div class="control-group">
                    <label>集合构建 (Set Builder)</label>
                    <div class="element-pool" id="elementPool">
                        <div class="element-item" draggable="true" data-type="worker">👷 工人</div>
                        <div class="element-item" draggable="true" data-type="farmer">🌾 农民</div>
                        <div class="element-item" draggable="true" data-type="soldier">🪖 军人</div>
                        <div class="element-item" draggable="true" data-type="scholar">🎓 知识分子</div>
                        <div class="element-item" draggable="true" data-type="youth">🚩 青年</div>
                    </div>
                    <p class="hint-text">拖拽元素到集合圆圈中</p>
                </div>

                <div class="control-group">
                    <label>集合运算 (Operations)</label>
                    <div class="ops-grid">
                        <button class="apple-btn op-btn" data-op="union" aria-label="并集 (∪)">并集 (∪)</button>
                        <button class="apple-btn op-btn" data-op="intersection" aria-label="交集 (∩)">交集 (∩)</button>
                        <button class="apple-btn op-btn" data-op="diffA" aria-label="差集 (A-B)">差集 (A-B)</button>
                        <button class="apple-btn op-btn" data-op="diffB" aria-label="差集 (B-A)">差集 (B-A)</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>思政解读</label>
                    <div class="info-panel">
                        <h3 id="szTitle">统一战线</h3>
                        <p id="szDesc">集合论中的“并集”象征着大团结，将不同的群体（集合元素）团结在党的周围，形成最广泛的统一战线。</p>
                    </div>
                </div>
            </div>

            <div class="actions-footer">
                <button id="resetBtn" class="apple-btn danger-btn" aria-label="重置">重置</button>
            </div>
        </aside>

        <main class="visualizer-stage">
            <div class="glass-pane">
                <div class="stage-header">
                    <h2>集合关系与运算</h2>
                    <p id="notationDisplay">A = {}, B = {}</p>
                </div>

                <div class="venn-container">
                    <div class="venn-wrapper">

                        <!-- SVG Venn Diagram: handles all region highlighting -->
                        <svg class="venn-bg-svg" viewBox="0 0 500 310"
                             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <defs>
                                <!-- Clip to circle A -->
                                <clipPath id="vClipA">
                                    <circle cx="150" cy="150" r="148"/>
                                </clipPath>
                                <!-- Mask: A minus B -->
                                <mask id="vMaskAonly">
                                    <rect width="500" height="310" fill="white"/>
                                    <circle cx="350" cy="150" r="148" fill="black"/>
                                </mask>
                                <!-- Mask: B minus A -->
                                <mask id="vMaskBonly">
                                    <rect width="500" height="310" fill="white"/>
                                    <circle cx="150" cy="150" r="148" fill="black"/>
                                </mask>
                            </defs>

                            <!-- Base fills -->
                            <circle cx="150" cy="150" r="148" fill="rgba(214,59,29,0.05)"/>
                            <circle cx="350" cy="150" r="148" fill="rgba(214,59,29,0.05)"/>

                            <!-- Highlight regions (opacity controlled by JS) -->
                            <circle id="svgHlA" cx="150" cy="150" r="148"
                                    fill="rgba(214,59,29,0.30)" mask="url(#vMaskAonly)"
                                    style="opacity:0;transition:opacity 0.35s ease;pointer-events:none"/>
                            <circle id="svgHlI" cx="350" cy="150" r="148"
                                    fill="rgba(255,180,0,0.60)" clip-path="url(#vClipA)"
                                    style="opacity:0;transition:opacity 0.35s ease;pointer-events:none"/>
                            <circle id="svgHlB" cx="350" cy="150" r="148"
                                    fill="rgba(214,59,29,0.30)" mask="url(#vMaskBonly)"
                                    style="opacity:0;transition:opacity 0.35s ease;pointer-events:none"/>

                            <!-- Drag-over feedback -->
                            <circle id="svgDragA" cx="150" cy="150" r="148"
                                    fill="rgba(214,59,29,0.14)"
                                    style="opacity:0;transition:opacity 0.15s ease;pointer-events:none"/>
                            <circle id="svgDragB" cx="350" cy="150" r="148"
                                    fill="rgba(214,59,29,0.14)"
                                    style="opacity:0;transition:opacity 0.15s ease;pointer-events:none"/>

                            <!-- Circle outlines -->
                            <circle cx="150" cy="150" r="148" fill="none"
                                    stroke="rgba(139,0,0,0.40)" stroke-width="2.5"/>
                            <circle cx="350" cy="150" r="148" fill="none"
                                    stroke="rgba(139,0,0,0.40)" stroke-width="2.5"/>
                        </svg>

                        <!-- Drop zones (transparent, handle DnD events) -->
                        <div id="setA" class="venn-circle set-a" aria-label="集合A拖放区">
                            <span class="set-label">集合 A (工)</span>
                            <div class="set-content"></div>
                        </div>
                        <div id="setB" class="venn-circle set-b" aria-label="集合B拖放区">
                            <span class="set-label">集合 B (农)</span>
                            <div class="set-content"></div>
                        </div>

                        <!-- Intersection element zone -->
                        <div id="setIntersect" class="venn-intersect"></div>
                    </div>

                    <!-- Operation label shown below diagram -->
                    <div id="opLabel" class="op-label hidden"></div>
                </div>

                <div id="resultBadge" class="result-badge hidden">
                    <span id="resultText">大团结</span>
                </div>
            </div>
        </main>
    </div>

    <script src="sets.js"></script>

<!-- 固定底部版权信息 -->
<footer style="
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(135deg, #D63B1D 0%, #B8321A 100%);
    color: white;
    padding: 15px 10px;
    text-align: center;
    box-shadow: 0 -4px 20px rgba(214, 59, 29, 0.25);
    z-index: 9999;
">

    </p>
</footer>


</body>

</html>
