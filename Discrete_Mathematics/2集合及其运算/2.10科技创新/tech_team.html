<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色数理 - 创新指挥中心</title>
    <meta name="description" content="离散数学课程 - 红色数理 - 创新指挥中心">

    <link rel="stylesheet" href="tech_team.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- 返回主页浮动按钮 (auto-injected) -->
    <a href="../../index.html" title="返回课程主页" style="
        position:fixed;top:14px;left:14px;z-index:9999;
        display:flex;align-items:center;gap:6px;
        background:rgba(30,30,40,0.82);color:#fff;
        padding:7px 14px 7px 10px;border-radius:20px;
        font-size:13px;font-family:'Noto Serif SC',serif;
        text-decoration:none;backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 2px 12px rgba(0,0,0,0.35);
        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"
       onmouseout="this.style.background='rgba(30,30,40,0.82)'">
        🏠 <span>课程主页</span>
    </a>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <h1>红色数理 <span class="highlight">创新指挥</span></h1>
                <p class="subtitle">Innovation Command Center</p>
            </div>

            <div class="controls-wrapper">
                <div class="control-group">
                    <label>系统扫描 (System Scans)</label>
                    <div class="scan-controls">
                        <button class="apple-btn scan-btn" data-scan="coverage" aria-label="全面覆盖分析 H ∪ S (Union)">
                            <span class="btn-icon">📡</span>
                            <div class="btn-text">
                                <span>全面覆盖分析</span>
                                <span class="btn-sub">H ∪ S (Union)</span>
                            </div>
                        </button>
                        <button class="apple-btn scan-btn" data-scan="gap" aria-label="盲区检测 (德摩根) (H ∪ S)ᶜ ↔ Hᶜ ∩ Sᶜ">
                            <span class="btn-icon">🔍</span>
                            <div class="btn-text">
                                <span>盲区检测 (德摩根)</span>
                                <span class="btn-sub">(H ∪ S)ᶜ ↔ Hᶜ ∩ Sᶜ</span>
                            </div>
                        </button>
                        <button class="apple-btn scan-btn" data-scan="devops" aria-label="研发效能分析 Dev ∩ Test">
                            <span class="btn-icon">⚡</span>
                            <div class="btn-text">
                                <span>研发效能分析</span>
                                <span class="btn-sub">Dev ∩ Test</span>
                            </div>
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label>数据流 (Data Stream)</label>
                    <div class="terminal-window">
                        <div class="terminal-header">
                            <span class="terminal-dot"></span>
                            <span class="terminal-title">SYS_LOG.log</span>
                        </div>
                        <div class="terminal-content" id="logContent">
                            <div class="log-line">> System Initialized...</div>
                            <div class="log-line">> Waiting for command...</div>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label>团队状态 (Status)</label>
                    <div class="status-grid">
                        <div class="status-item">
                            <span class="status-label">总人数</span>
                            <span class="status-val" id="totalCount">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">已覆盖</span>
                            <span class="status-val highlight-blue" id="coveredCount">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">盲区</span>
                            <span class="status-val highlight-red" id="gapCount">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions-footer">
                <button id="resetBtn" class="apple-btn secondary-btn" aria-label="重置系统">重置系统</button>
            </div>
        </aside>

        <main class="visualizer-stage">
            <div class="glass-pane">
                <div class="stage-header">
                    <h2 id="stageTitle">团队协作网络</h2>
                    <p id="stageSubtitle">Tech Collaboration Network</p>
                </div>

                <div class="circuit-board" id="circuitBoard">
                    <!-- SVG Overlay for connections -->
                    <svg class="circuit-svg" id="circuitSvg"></svg>

                    <!-- Nodes will be injected here -->
                    <div class="nodes-container" id="nodesContainer"></div>

                    <!-- Terminals -->
                    <div class="terminal-node hardware-term">
                        <span class="term-icon">🔧</span>
                        <span>Hardware Test</span>
                    </div>
                    <div class="terminal-node software-term">
                        <span class="term-icon">💻</span>
                        <span>Software Test</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="tech_team.js"></script>

    position: fixed;
    bottom: 0;
    left: 0;

    padding: 15px 10px;
    text-align: center;
    box-shadow: 0 -4px 20px rgba(214, 59, 29, 0.25);
    z-index: 9999;
">

    </p>
</footer>


</body>

</html>
