    <script>
        var $ = function (id) { return document.getElementById(id); };
        var type = 'full';
        var TXT = {
            empty: { info: '<b>空关系 ∅</b>：不含任何有序对，矩阵全 0、图无边。它「平凡地」满足对称、反对称、传递。', desc: '空关系是关系世界的一个<b>边界</b>——什么联系都没有。' },
            full: { info: '<b>全关系 A×A</b>：包含所有有序对，矩阵全 1、任两点（含自身）都有边。自反、对称、传递，但不反对称（n≥2）。', desc: '全关系是另一个<b>边界</b>——人人两两相联。' },
            id: { info: '<b>恒等关系 I_A</b>：只含 (a,a)，矩阵为<b>单位阵</b>、图只有自环。同时自反+对称+传递+反对称，是一种等价关系，也是关系合成的<b>单位元</b>。', desc: '恒等关系是中正的<b>基准</b>——只与自身相联，犹如运算里的「1」。' }
        };
        function has(i, j) { if (type === 'empty') return false; if (type === 'full') return true; return i === j; }
        function render() {
            var n = +$('nRange').value; $('nVal').textContent = n;
            // matrix
            var g = $('mtx'); g.style.gridTemplateColumns = 'repeat(' + (n + 1) + ', auto)';
            var html = '<div class="mcell corner"></div>';
            for (var j = 1; j <= n; j++) html += '<div class="mcell hdr">' + j + '</div>';
            for (var i = 1; i <= n; i++) {
                html += '<div class="mcell hdr">' + i + '</div>';
                for (var j2 = 1; j2 <= n; j2++) { var on = has(i, j2); var cls = on ? (i === j2 ? 'diag1' : 'b1') : 'b0'; html += '<div class="mcell ' + cls + '">' + (on ? 1 : 0) + '</div>'; }
            }
            g.innerHTML = html;
            // graph on circle
            var cx = 120, cy = 120, R = 82, svg = '';
            var pts = [];
            for (var k = 0; k < n; k++) { var a = -Math.PI / 2 + k * 2 * Math.PI / n; pts.push([cx + R * Math.cos(a), cy + R * Math.sin(a)]); }
            // edges
            for (var i3 = 1; i3 <= n; i3++) for (var j3 = 1; j3 <= n; j3++) if (has(i3, j3)) {
                var p1 = pts[i3 - 1], p2 = pts[j3 - 1];
                if (i3 === j3) { svg += '<circle cx="' + (p1[0]) + '" cy="' + (p1[1] - 20) + '" r="9" fill="none" stroke="#ffb400" stroke-width="2"/>'; }
                else { svg += '<line x1="' + p1[0] + '" y1="' + p1[1] + '" x2="' + p2[0] + '" y2="' + p2[1] + '" stroke="#d63b1d" stroke-width="1.5" opacity="0.55"/>'; }
            }
            for (var m = 0; m < n; m++) { svg += '<circle cx="' + pts[m][0] + '" cy="' + pts[m][1] + '" r="14" fill="#d63b1d"/><text x="' + pts[m][0] + '" y="' + (pts[m][1] + 4) + '" text-anchor="middle">' + (m + 1) + '</text>'; }
            $('cg').innerHTML = svg;
            $('info').innerHTML = TXT[type].info;
            $('desc').innerHTML = TXT[type].desc + ' 当前 |R| = <b>' + (type === 'empty' ? 0 : type === 'full' ? n * n : n) + '</b>。';
        }
        [].forEach.call($('seg').querySelectorAll('button'), function (b) {
            b.onclick = function () { type = b.dataset.t; [].forEach.call($('seg').querySelectorAll('button'), function (x) { x.classList.remove('active'); }); b.classList.add('active'); render(); };
        });
        $('nRange').oninput = render;
        render();
    </script>

    <script data-dm-ideology-bridge="1">
    (function () {
        function esc(s) {
            return String(s || '').replace(/[&<>"']/g, function (c) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
            });
        }
        function noteHtml() {
            var ideology = (window.SECTION_META && window.SECTION_META.ideology) || {};

                + esc(title) + '”主线。' + esc(text) + '</span>';
        }
        function appendIdeologyNote() {
            if (document.querySelector('[data-ideology-inline="1"]')) return;
            var resultExtra = document.getElementById('resultExtra');
            if (resultExtra) {
                resultExtra.insertAdjacentHTML('beforeend', noteHtml());
                return;
            }
            var anchor = document.querySelector('.result-panel, #eqOut, #note, .visualization-area');
            if (!anchor) return;
            if (anchor.id === 'eqOut' || anchor.id === 'note') anchor.insertAdjacentHTML('afterend', noteHtml());
            else anchor.insertAdjacentHTML('beforeend', noteHtml());
        }
        function wrapSetResult() {
            var original = window.setResult;
            if (typeof original !== 'function' || original.__ideologyWrapped) return;
            window.setResult = function () {
                var ret = original.apply(this, arguments);
                appendIdeologyNote();
                return ret;
            };
            window.setResult.__ideologyWrapped = true;
        }
        function boot() {
            wrapSetResult();
            appendIdeologyNote();
            ['input', 'change', 'click'].forEach(function (eventName) {
                document.addEventListener(eventName, function () {
                    setTimeout(appendIdeologyNote, 0);
                }, true);
            });
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
        else boot();
    })();
