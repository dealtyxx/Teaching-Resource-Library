    <script>
        var $ = function (id) { return document.getElementById(id); };
        var n = 5, R = {};
        function key(i, j) { return i + '_' + j; }
        function grid(id, set, addset) {
            var g = $(id); g.style.gridTemplateColumns = 'repeat(' + (n + 1) + ', auto)';
            var html = '<div class="mcell corner"></div>';
            for (var j = 1; j <= n; j++) html += '<div class="mcell hdr">' + j + '</div>';
            for (var i = 1; i <= n; i++) { html += '<div class="mcell hdr">' + i + '</div>'; for (var j2 = 1; j2 <= n; j2++) { var k = key(i, j2); var on = set[k]; var cls = on ? (addset && addset[k] ? 'add' : 'b1') : 'b0'; html += '<div class="mcell ' + cls + '"' + (id === 'mR' ? ' data-i="' + i + '" data-j="' + j2 + '"' : '') + '>' + (on ? 1 : 0) + '</div>'; } }
            g.innerHTML = html; return g;
        }
        function transClosure(base) {
            var C = {}; for (var k in base) C[k] = 1;
            for (var m = 1; m <= n; m++) for (var i = 1; i <= n; i++) for (var j = 1; j <= n; j++) if (C[key(i, m)] && C[key(m, j)]) C[key(i, j)] = 1;
            return C;
        }
        function render() {
            n = +$('nRange').value; $('nVal').textContent = n;
            Object.keys(R).forEach(function (k) { var p = k.split('_'); if (+p[0] > n || +p[1] > n) delete R[k]; });
            var gR = grid('mR', R, null);
            [].forEach.call(gR.querySelectorAll('.mcell[data-i]'), function (c) { c.onclick = function () { var k = key(+c.dataset.i, +c.dataset.j); if (R[k]) delete R[k]; else R[k] = 1; render(); }; });
            // r
            var r = {}, ra = {}; for (var k in R) r[k] = 1; for (var i = 1; i <= n; i++) { if (!r[key(i, i)]) ra[key(i, i)] = 1; r[key(i, i)] = 1; }
            grid('mr', r, ra);
            // s
            var s = {}, sa = {}; for (var k2 in R) s[k2] = 1; for (var a = 1; a <= n; a++) for (var b = 1; b <= n; b++) if (R[key(a, b)] && !s[key(b, a)]) { sa[key(b, a)] = 1; s[key(b, a)] = 1; }
            grid('ms', s, sa);
            // t
            var t = transClosure(R), ta = {}; for (var k3 in t) if (!R[k3]) ta[k3] = 1;
            grid('mt', t, ta);
            var nT = Object.keys(t).length, nR = Object.keys(R).length, newReach = Object.keys(ta).length;
            $('note').innerHTML = '传递闭包新增 <b>' + newReach + '</b> 条「间接可达」(金色)：|R|=' + nR + ' → |t(R)|=' + nT + '。<br>' +
                '<b>t(R) 就是可达矩阵</b>——亲子关系的 t(R)=<b>祖先关系</b>；依赖关系的 t(R)=<b>全部间接依赖</b>；数据库用 <code>WITH RECURSIVE</code> 求层级闭包。';
        }
        $('nRange').oninput = render;
        $('chainBtn').onclick = function () { R = {}; for (var i = 1; i < n; i++) R[key(i, i + 1)] = 1; render(); };
        $('randBtn').onclick = function () { R = {}; for (var i = 1; i <= n; i++) for (var j = 1; j <= n; j++) if (i !== j && Math.random() < 0.22) R[key(i, j)] = 1; render(); };
        $('clearBtn').onclick = function () { R = {}; render(); };
        $('chainBtn').onclick();
    </script>
