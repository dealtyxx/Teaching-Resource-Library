    <script>
        var $ = function (id) { return document.getElementById(id); };
        var n = 4, R = {}, kind = 'r';
        function key(i, j) { return i + '_' + j; }
        function grid(id, set, addset) {
            var g = $(id); g.style.gridTemplateColumns = 'repeat(' + (n + 1) + ', auto)';
            var html = '<div class="mcell corner"></div>';
            for (var j = 1; j <= n; j++) html += '<div class="mcell hdr">' + j + '</div>';
            for (var i = 1; i <= n; i++) { html += '<div class="mcell hdr">' + i + '</div>'; for (var j2 = 1; j2 <= n; j2++) { var k = key(i, j2); var on = set[k]; var cls = on ? (addset && addset[k] ? 'add' : 'b1') : 'b0'; html += '<div class="mcell ' + cls + '" data-i="' + i + '" data-j="' + j2 + '">' + (on ? 1 : 0) + '</div>'; } }
            g.innerHTML = html;
            return g;
        }
        function render() {
            n = +$('nRange').value; $('nVal').textContent = n;
            Object.keys(R).forEach(function (k) { var p = k.split('_'); if (+p[0] > n || +p[1] > n) delete R[k]; });
            var gR = grid('mtxR', R, null);
            [].forEach.call(gR.querySelectorAll('.mcell[data-i]'), function (c) { c.onclick = function () { var k = key(+c.dataset.i, +c.dataset.j); if (R[k]) delete R[k]; else R[k] = 1; render(); }; });
            // closure
            var C = {}, add = {}; for (var k in R) C[k] = 1;
            if (kind === 'r') { for (var i = 1; i <= n; i++) { var d = key(i, i); if (!C[d]) { add[d] = 1; } C[d] = 1; } }
            else { for (var a = 1; a <= n; a++) for (var b = 1; b <= n; b++) if (R[key(a, b)] && !C[key(b, a)]) { add[key(b, a)] = 1; C[key(b, a)] = 1; } }
            grid('mtxC', C, add);
            var nAdd = Object.keys(add).length, nR = Object.keys(R).length;
            if (kind === 'r') $('note').innerHTML = '<b>自反闭包 r(R)=R∪I</b>：补上对角线缺失的 <span class="gold">' + nAdd + '</span> 个 (a,a)。<br>|R|=' + nR + ' → |r(R)|=' + (nR + nAdd) + '。这是使 R 自反的<b>最小</b>添加——多一个都不必、少一个则不自反。';
            else $('note').innerHTML = '<b>对称闭包 s(R)=R∪R⁻¹</b>：为每个单向 (a,b) 补上反向 <span class="gold">' + nAdd + '</span> 个 (b,a)。<br>|R|=' + nR + ' → |s(R)|=' + (nR + nAdd) + '。这是使 R 对称的<b>最小</b>添加。';
        }
        [].forEach.call($('seg').querySelectorAll('button'), function (b) { b.onclick = function () { kind = b.dataset.k; [].forEach.call($('seg').querySelectorAll('button'), function (x) { x.classList.remove('active'); }); b.classList.add('active'); render(); }; });
        $('nRange').oninput = render;
        $('randBtn').onclick = function () { R = {}; for (var i = 1; i <= n; i++) for (var j = 1; j <= n; j++) if (Math.random() < 0.3) R[key(i, j)] = 1; render(); };
        $('clearBtn').onclick = function () { R = {}; render(); };
        $('randBtn').onclick();
    </script>
