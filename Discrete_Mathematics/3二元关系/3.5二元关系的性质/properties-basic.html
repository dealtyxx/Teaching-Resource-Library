    <script>
        var $ = function (id) { return document.getElementById(id); };
        var n = 4, R = {}, prop = 'refl';
        function key(i, j) { return i + '_' + j; }
        var TXT = {
            refl: { info: '<b>自反性</b>：∀a, aRa——每个元素都与自己相关。模式：<b>主对角线全为 1</b>。', ptn: '焦点：<b>主对角线</b>。自反 ⇔ 对角线每格都是 1。' },
            sym: { info: '<b>对称性</b>：aRb ⇒ bRa——关系双向。模式：矩阵<b>关于主对角线镜像对称</b>。', ptn: '焦点：<b>镜像格 (i,j) 与 (j,i)</b>。对称 ⇔ 二者总相等。' },
            trans: { info: '<b>传递性</b>：aRb 且 bRc ⇒ aRc——可顺链相连。模式：<b>无断链</b>（R²⊆R）。', ptn: '传递 ⇔ 凡有 a→b→c 的两跳，必有直达 a→c。' }
        };
        function check() {
            var bad = {};
            var ok = true;
            if (prop === 'refl') { for (var i = 1; i <= n; i++) if (!R[key(i, i)]) { ok = false; bad[key(i, i)] = 1; } }
            else if (prop === 'sym') { for (var a = 1; a <= n; a++) for (var b = 1; b <= n; b++) if (!!R[key(a, b)] !== !!R[key(b, a)]) { ok = false; bad[key(a, b)] = 1; } }
            else { for (var a2 = 1; a2 <= n; a2++) for (var b2 = 1; b2 <= n; b2++) if (R[key(a2, b2)]) for (var c = 1; c <= n; c++) if (R[key(b2, c)] && !R[key(a2, c)]) { ok = false; bad[key(a2, c)] = 1; } }
            return { ok: ok, bad: bad };
        }
        function render() {
            n = +$('nRange').value; $('nVal').textContent = n;
            Object.keys(R).forEach(function (k) { var p = k.split('_'); if (+p[0] > n || +p[1] > n) delete R[k]; });
            var res = check();
            var g = $('mtx'); g.style.gridTemplateColumns = 'repeat(' + (n + 1) + ', auto)';
            var html = '<div class="mcell corner"></div>';
            for (var j = 1; j <= n; j++) html += '<div class="mcell hdr">' + j + '</div>';
            for (var i = 1; i <= n; i++) {
                html += '<div class="mcell hdr">' + i + '</div>';
                for (var j2 = 1; j2 <= n; j2++) {
                    var on = R[key(i, j2)], cls = on ? 'b1' : 'b0';
                    if (prop === 'refl' && i === j2) cls += ' diag';
                    if (res.bad[key(i, j2)]) cls += ' bad';
                    html += '<div class="mcell ' + cls + '" data-i="' + i + '" data-j="' + j2 + '">' + (on ? 1 : 0) + '</div>';
                }
            }
            g.innerHTML = html;
            [].forEach.call(g.querySelectorAll('.mcell[data-i]'), function (c) { c.onclick = function () { var k = key(+c.dataset.i, +c.dataset.j); if (R[k]) delete R[k]; else R[k] = 1; render(); }; });
            $('info').innerHTML = TXT[prop].info;
            $('ptn').innerHTML = TXT[prop].ptn;
            var v = $('verdict');
            var nm = { refl: '自反', sym: '对称', trans: '传递' }[prop];
            if (res.ok) { v.className = 'verdict y'; v.innerHTML = '✅ 当前关系<b>满足' + nm + '性</b>。'; }
            else { v.className = 'verdict n'; v.innerHTML = '❌ <b>不满足' + nm + '性</b>：红框处违例（' + (prop === 'refl' ? '对角缺 1' : prop === 'sym' ? '镜像不一致' : '缺直达边') + '）。'; }
        }
        [].forEach.call($('seg').querySelectorAll('button'), function (b) { b.onclick = function () { prop = b.dataset.p; [].forEach.call($('seg').querySelectorAll('button'), function (x) { x.classList.remove('active'); }); b.classList.add('active'); render(); }; });
        $('nRange').oninput = render;
        $('randBtn').onclick = function () { R = {}; for (var i = 1; i <= n; i++) for (var j = 1; j <= n; j++) if (Math.random() < 0.4) R[key(i, j)] = 1; render(); };
        $('clearBtn').onclick = function () { R = {}; render(); };
        $('randBtn').onclick();
    </script>

        "dims": [

        reflect: ["自反与反自反是否互为否定？能否两者都不满足？", "对称为什么对应矩阵的镜像相等？"],
        transfer: ["五性质的不同组合 → 等价关系、偏序关系（拓展层）。"]

    <script data-dm-ideology-bridge="1">
    (function () {
        function esc(s) {
            return String(s || '').replace(/[&<>"']/g, function (c) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
            });
        }
        function noteHtml() {

            var title = ideology.title || '价值引领';

                + esc(title) + '”主线。' + esc(text) + '</span>';
        }
        function appendIdeologyNote() {
            if (document.querySelector('[data-ideology-inline="1"]')) return;
            var resultExtra = document.getElementById('resultExtra');
            if (resultExtra) {
                resultExtra.insertAdjacentHTML('beforeend', noteHtml());
                return;
            }
            var anchor = document.querySelector('.result-panel, #eqOut, #note, .visualization-area');
            if (!anchor) return;
            if (anchor.id === 'eqOut' || anchor.id === 'note') anchor.insertAdjacentHTML('afterend', noteHtml());
            else anchor.insertAdjacentHTML('beforeend', noteHtml());
        }
        function wrapSetResult() {
            var original = window.setResult;
            if (typeof original !== 'function' || original.__ideologyWrapped) return;
            window.setResult = function () {
                var ret = original.apply(this, arguments);
                appendIdeologyNote();
                return ret;
            };
            window.setResult.__ideologyWrapped = true;
        }
        function boot() {
            wrapSetResult();
            appendIdeologyNote();
            ['input', 'change', 'click'].forEach(function (eventName) {
                document.addEventListener(eventName, function () {
                    setTimeout(appendIdeologyNote, 0);
                }, true);
            });
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
        else boot();
    })();
    </script>
