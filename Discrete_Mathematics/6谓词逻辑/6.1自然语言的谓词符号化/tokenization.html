<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词符号化 - 传承中华文化</title>
    <meta name="description" content="离散数学课程 - 诗词符号化 - 传承中华文化">

    <link rel="stylesheet" href="tokenization.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../shared/discrete-ui.css" data-dm-ui="1">
    <script src="../../shared/mathjax-auto.js" data-dm-mathjax="1"></script>
</head>

<body>
    <!-- 返回主页浮动按钮 (auto-injected) -->
    <a href="../../index.html" title="返回课程主页" style="
        position:fixed;top:14px;left:14px;z-index:9999;
        display:flex;align-items:center;gap:6px;
        background:rgba(30,30,40,0.82);color:#fff;
        padding:7px 14px 7px 10px;border-radius:20px;
        font-size:13px;font-family:'Noto Serif SC',serif;
        text-decoration:none;backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 2px 12px rgba(0,0,0,0.35);
        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"
       onmouseout="this.style.background='rgba(30,30,40,0.82)'">
        🏠 <span>课程主页</span>
    </a>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <h1>红色数理 <span class="highlight">进阶层</span></h1>
                <p class="subtitle">谓词符号化积木台 · 传承</p>
            </div>

            <div class="controls-wrapper">
                <div class="control-group">
                    <label>选择经典诗词</label>
                    <select id="poemSelect" class="apple-select">
                        <option value="0">《沁园春·雪》- 毛泽东</option>
                        <option value="1">《春望》- 杜甫</option>
                        <option value="2">《水调歌头》- 苏轼</option>
                        <option value="3">《登高》- 杜甫</option>
                        <option value="custom">自定义输入...</option>
                    </select>
                </div>

                <div class="control-group" id="customInputGroup" style="display: none;">
                    <label>输入您的文本</label>
                    <textarea id="customInput" class="apple-textarea" rows="4"
                        placeholder="请输入中文诗词或句子..."></textarea>
                </div>

                <div class="control-group">
                    <label>符号化方式</label>
                    <div class="token-mode-buttons">
                        <button class="mode-btn active" data-mode="word" aria-label="词语切分">词语切分</button>
                        <button class="mode-btn" data-mode="char" aria-label="字符切分">字符切分</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>动画速度</label>
                    <input type="range" id="speed" min="1" max="100" value="60">
                </div>

                <div class="control-group">
                    <label>当前状态</label>
                    <div class="info-panel">
                        <p id="statusText">准备开始符号化</p>
                        <div class="stats-display">
                            <div class="stat-item">
                                <span class="stat-label">已处理:</span>
                                <span class="stat-value" id="processedCount">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">总数:</span>
                                <span class="stat-value" id="totalCount">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions-footer">
                <button id="startBtn" class="apple-btn action-btn" aria-label="开始演示">开始演示</button>
                <button id="resetBtn" class="apple-btn danger-btn" aria-label="重置">重置</button>
            </div>
        </aside>

        <main class="visualizer-stage">
            <div class="glass-pane">
                <div class="visualization-container">
                    <!-- 原文区域 -->
                    <div class="section original-section">
                        <h2 class="section-title">原文</h2>
                        <div id="originalText" class="text-display">
                            <div class="poem-lines"></div>
                        </div>
                    </div>

                    <!-- 箭头动画区域 -->
                    <div class="arrow-section">
                        <svg class="flow-arrow" viewBox="0 0 100 200" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#d63b1d;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#ffb400;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <path d="M 50 10 L 50 180 M 50 180 L 40 165 M 50 180 L 60 165"
                                stroke="url(#arrowGradient)" stroke-width="3" fill="none"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="process-label">符号化处理</div>
                    </div>

                    <!-- 符号化结果区域 -->
                    <div class="section tokens-section">
                        <h2 class="section-title">符号序列</h2>
                        <div id="tokensDisplay" class="tokens-container"></div>
                    </div>

                    <!-- 谓词逻辑符号化区域 -->
                    <div class="section predicate-section">
                        <h2 class="section-title">谓词逻辑符号化</h2>
                        <div class="predicate-container">
                            <div class="logic-explanation">
                                <div class="explanation-title">符号体系说明</div>
                                <div class="symbol-legend">
                                    <div class="legend-item">
                                        <span class="symbol">∀x</span>
                                        <span class="desc">全称量词 - 对所有个体</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="symbol">∃x</span>
                                        <span class="desc">存在量词 - 存在个体</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="symbol">P(x)</span>
                                        <span class="desc">谓词 - 描述性质或关系</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="symbol">∧</span>
                                        <span class="desc">逻辑与</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="symbol">∨</span>
                                        <span class="desc">逻辑或</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="symbol">¬</span>
                                        <span class="desc">逻辑非</span>
                                    </div>
                                    <div class="legend-item">
                                        <span class="symbol">→</span>
                                        <span class="desc">蕴含</span>
                                    </div>
                                </div>
                            </div>
                            <div id="predicateFormulas" class="formulas-display"></div>
                        </div>
                    </div>

                    <!-- 树形结构区域 -->
                    <div class="section tree-section">
                        <h2 class="section-title">分类树状图</h2>
                        <svg id="treeSvg" width="100%" height="300">
                            <g id="treeGroup"></g>
                        </svg>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="tokenization.js"></script>

    <!-- ===== 共享升级框架：学习助手（AI助教 / 六步流程 / 价值引领 / 反思迁移）===== -->
    <script>
    window.SECTION_META = {
      "layers": [
            {
                  "name": "个体词·谓词·量词",
                  "concepts": "P(x) / ∀ ∃ / 论域",
                  "task": "认识谓词逻辑的基本构件。",
                  "page": "tokenization-basic.html"
            },
            {
                  "name": "全称·存在符号化",
                  "concepts": "∀x(P→Q) / ∃x(P∧Q) / 辖域",
                  "task": "正确符号化『所有/有些』判断。",
                  "page": "tokenization.html"
            },
            {
                  "name": "数据库与知识表示",
                  "concepts": "EXISTS·ALL·ANY / 本体",
                  "task": "迁移到数据库查询与知识表示。",
                  "page": "tokenization-extend.html"
            }
      ],
      "chapter": "第6章 谓词逻辑",
      "section": "6.1 自然语言的谓词符号化",
      "title": "谓词符号化",
      "grounding": "本节主题：谓词逻辑引入个体词、谓词 P(x)、量词（全称∀、存在∃）。符号化要点：确定论域、识别谓词、正确使用量词与辖域。『所有…都…』用 ∀x(P(x)→Q(x))，『有些…是…』用 ∃x(P(x)∧Q(x))，量词与联结词的搭配是常见易错点。",
      "steps": [
            {
                  "name": "情境引入",
                  "desc": "『所有』『有些』这类全称/存在判断，命题逻辑为何力不从心？"

            {
                  "name": "对象抽取",

            {
                  "name": "结构建模",
                  "desc": "用 ∀/∃ 与谓词把自然语言精确符号化。"
            },
            {

                  "desc": "辨析 ∀→ 与 ∃∧ 的正确搭配，避免常见错误。"

            },
            {
                  "name": "迁移反思",
                  "desc": "迁移到数据库查询、知识表示、形式规约。"

      ],
      "ideology": {

            "dims": [
                  "文化自信",

      "reflect": [
            "『所有 P 都是 Q』为何用 ∀x(P(x)→Q(x)) 而不是 ∀x(P(x)∧Q(x))？后者错在哪？",

            }
      ]
};
    </script>
