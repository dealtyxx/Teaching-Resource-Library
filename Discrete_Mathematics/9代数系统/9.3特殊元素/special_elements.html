    <style>
        /* 扩展样式 */
        .sidebar {
            overflow-y: auto;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;

        }

        .element-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .element-btn {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--accent-red);
            background: #fff;
            color: var(--accent-red);
            font-family: var(--font-family);
            text-align: center;
        }

        .element-btn.active {
            background: var(--accent-red);
            color: #fff;
        }

        .element-btn:hover:not(.active) {
            background: rgba(214, 59, 29, 0.1);
        }

        select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(139, 0, 0, 0.2);
            background: #fff;
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* 右侧面板 */
        .glass-pane {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1rem;
            padding: 1rem;
        }

        .visualization-area {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .element-display {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            position: relative;
        }

        .element-display h3 {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--accent-red);
            margin-bottom: 1.5rem;
        }

        .element-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-red), var(--accent-gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            font-family: 'Courier New', monospace;
            box-shadow: 0 8px 24px rgba(214, 59, 29, 0.3);
            animation: elementPulse 2s ease-in-out infinite;
        }

        @keyframes elementPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(214, 59, 29, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 12px 32px rgba(214, 59, 29, 0.5); }
        }

        .element-description {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-top: 1rem;
        }

        .operation-demo {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 1.5rem;
            flex: 1;
        }

        .operation-demo h4 {
            font-family: var(--font-title);
            font-size: 1.1rem;
            color: var(--accent-red);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 0.5rem;
        }

        .demo-item {
            background: rgba(255, 255, 255, 0.8);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            border-left: 4px solid var(--accent-gold);
            transition: all 0.3s ease;
        }

        .demo-item:hover {
            background: rgba(255, 248, 240, 0.95);
            transform: translateX(4px);
        }

        .demo-item.active {
            border-left-color: var(--accent-red);
            background: rgba(214, 59, 29, 0.15);
            animation: demoHighlight 1s ease-in-out;
        }

        @keyframes demoHighlight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        .demo-expression {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: var(--accent-red);
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .demo-result {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .info-panel-right {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .definition-panel {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(139, 0, 0, 0.1);
        }

        .definition-panel h3 {
            font-family: var(--font-title);
            font-size: 1.1rem;
            color: var(--accent-red);
            margin-bottom: 0.8rem;
            border-bottom: 2px solid var(--accent-red);

            font-size: 0.9rem;
            color: var(--accent-red);
            margin: 0.5rem 0;
            border-left: 4px solid var(--accent-red);

        .properties-panel {
            background: rgba(255, 255, 255, 0.5);

        .properties-panel h3 {

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .property-item .text {
            flex: 1;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        @media (max-width: 1200px) {
            .glass-pane {
                grid-template-columns: 1fr;
            }
