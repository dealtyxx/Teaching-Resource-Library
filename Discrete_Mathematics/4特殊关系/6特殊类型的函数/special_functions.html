    <script>
    (function () {
      const symbolPattern = /I_A|χ_S|χ_A/;
      const skipTags = new Set(['SCRIPT', 'STYLE', 'TEXTAREA', 'SELECT', 'OPTION']);
      function escapeHtml(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function symbolHtml(text) {
        return escapeHtml(text)
          .replace(/I_A/g, '<span class="math-symbol">I<sub>A</sub></span>')
          .replace(/χ_S/g, '<span class="math-symbol">χ<sub>S</sub></span>')
          .replace(/χ_A/g, '<span class="math-symbol">χ<sub>A</sub></span>');
      }
      function formatSymbols(root) {
        const walker = document.createTreeWalker(root || document.body, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            const parent = node.parentElement;
            if (!parent || skipTags.has(parent.tagName)) return NodeFilter.FILTER_REJECT;
            return symbolPattern.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
          }
        });
        const nodes = [];
        let node;
        while ((node = walker.nextNode())) nodes.push(node);
        nodes.forEach(textNode => {
          const span = document.createElement('span');
          span.innerHTML = symbolHtml(textNode.nodeValue);
          textNode.parentNode.replaceChild(span, textNode);
        });
      }
      document.addEventListener('DOMContentLoaded', () => {
        formatSymbols(document.body);
        new MutationObserver(mutations => {
          mutations.forEach(m => m.addedNodes.forEach(node => {
            if (node.nodeType === Node.TEXT_NODE && symbolPattern.test(node.nodeValue)) formatSymbols(node.parentElement);
            else if (node.nodeType === Node.ELEMENT_NODE) formatSymbols(node);
          }));
        }).observe(document.body, { childList: true, subtree: true });
      });
    })();
    </script>
