  <script>
  window.SECTION_META = {
    chapter: "第 8 章 特殊图",
    section: "8.8 古镇修复路径案例",
    title: "古镇邮路补边 · 拓展层",
    layers: [
      { name: "街巷建模", concepts: "街巷为边 / 路口为顶点", task: "把古镇街巷抽象为图。", page: "index-basic.html" },
      { name: "路径规划", concepts: "欧拉遍历 / MST 最省连通", task: "规划遍历或最省成本修复路径。", page: "index.html" },
      { name: "巡检与邮路", concepts: "市政巡检 / 中国邮路", task: "迁移到巡检与最优环游。", page: "index-extend.html" }
    ],
    grounding: "在必须回到起点的巡检任务中，用邮路补边思想把非欧拉图改造成可闭合巡检的方案。",
    steps: [
      { name: "识别奇点", desc: "找出奇度路口，解释为什么不能直接闭合一笔走。" },
      { name: "最短补边", desc: "在奇点之间选择重复成本较低的路径。" },
      { name: "故障推演", desc: "模拟街巷封闭，比较方案鲁棒性。" },
      { name: "工程迁移", desc: "迁移到市政巡检、邮路配送和遗产保护调度。" }
    ],
    ideology: {
      title: "精细治理 · 低扰保护",
      text: "古镇修复既要覆盖全面，也要减少重复扰动。邮路补边体现以最少代价完成公共服务的治理智慧。",
      dims: ["精细治理", "低扰保护", "系统优化"]
    }
  };

  const baseNodes = [
    { id:0, name:"东门", role:"入口集散", x:180, y:250, mark:"东" },
    { id:1, name:"鼓楼", role:"核心地标", x:360, y:165, mark:"鼓" },
    { id:2, name:"书院", role:"文化记忆", x:560, y:200, mark:"书" },
    { id:3, name:"石桥", role:"水系通达", x:700, y:350, mark:"桥" },
    { id:4, name:"戏台", role:"公共活动", x:540, y:430, mark:"戏" },
    { id:5, name:"西巷", role:"传统民居", x:300, y:430, mark:"西" },
    { id:6, name:"祠堂", role:"宗族记忆", x:170, y:400, mark:"祠" },
    { id:7, name:"集市", role:"生活街区", x:430, y:350, mark:"市" }
  ];
  const baseEdges = [
    [0,1,3], [1,2,4], [2,3,3], [3,4,5], [4,5,4], [5,6,3], [6,0,4],
    [0,7,2], [1,7,2], [2,7,3], [3,7,2], [4,7,3], [5,7,2]
  ].map(([u,v,w], id) => ({id,u,v,w}));
  let nodes = baseNodes.map(n=>({...n}));
  let failedKey = "none";
  let plan = {duplicates: [], odd: [], total: 0, dupCost: 0, state: "待生成"};
  const svg = document.getElementById("townSvg");
  const tooltip = document.getElementById("tooltip");
  const edgeList = document.getElementById("edgeList");
  const explain = document.getElementById("explain");
  const oddMetric = document.getElementById("oddMetric");
  const dupMetric = document.getElementById("dupMetric");
  const totalMetric = document.getElementById("totalMetric");
  const stateMetric = document.getElementById("stateMetric");
  const budget = document.getElementById("budget");
  const budgetText = document.getElementById("budgetText");
  const failMode = document.getElementById("failMode");
  const goalMode = document.getElementById("goalMode");
  const key = e => [e.u,e.v].sort((a,b)=>a-b).join("-");
  const node = id => nodes.find(n=>n.id===id);
  function activeEdges() { return baseEdges.map(e=>({...e, failed: key(e) === failedKey})); }
  function degrees(edges) {
    const d = Array(nodes.length).fill(0);
    edges.filter(e=>!e.failed).forEach(e => { d[e.u]++; d[e.v]++; });
    return d;
  }
  function shortest(edges, s, t) {
    const dist = Array(nodes.length).fill(Infinity), prev = Array(nodes.length).fill(null), used = new Set();
    dist[s] = 0;
    while (used.size < nodes.length) {
      let u = -1, best = Infinity;
      for (let i=0;i<nodes.length;i++) if(!used.has(i) && dist[i] < best) { best = dist[i]; u = i; }
      if (u < 0 || u === t) break;
      used.add(u);
      edges.filter(e=>!e.failed && (e.u===u || e.v===u)).forEach(e => {
        const v = e.u === u ? e.v : e.u;
        if (dist[u] + e.w < dist[v]) { dist[v] = dist[u] + e.w; prev[v] = {u, e}; }
      });
    }
    const path = [];
    let cur = t;
    while (prev[cur]) { path.unshift(prev[cur].e); cur = prev[cur].u; }
    return {cost: dist[t], path};
  }
  function pairOdd(edges, odd) {
    if (odd.length < 2) return {cost:0, paths:[]};
    if (odd.length === 2) {
      const sp = shortest(edges, odd[0], odd[1]);
      return {cost: sp.cost, paths: [sp.path]};
    }
    let best = {cost: Infinity, paths: []};
    function rec(list, cost, paths) {
      if (!list.length) { if (cost < best.cost) best = {cost, paths}; return; }
      const first = list[0];
      for (let i=1;i<list.length;i++) {
        const second = list[i], sp = shortest(edges, first, second);
        rec(list.filter(x=>x!==first && x!==second), cost + sp.cost, paths.concat([sp.path]));
      }
    }
    rec(odd, 0, []);
    return best;
  }
  function components(edges) {
    const parent = nodes.map((_,i)=>i);
    const find = x => parent[x] === x ? x : parent[x] = find(parent[x]);
    edges.filter(e=>!e.failed).forEach(e => { const a=find(e.u), b=find(e.v); if(a!==b) parent[b]=a; });
    return new Set(nodes.map(n=>find(n.id))).size;
  }
  function generatePlan() {
    failedKey = failMode.value;
    budgetText.textContent = budget.value;
    const edges = activeEdges();
    const odd = degrees(edges).map((v,i)=>v%2?i:null).filter(v=>v!==null);
    const pair = pairOdd(edges, odd);
    const duplicateEdges = pair.paths.flat();
    const baseCost = edges.filter(e=>!e.failed).reduce((s,e)=>s+e.w,0);
    const budgetCap = Number(budget.value) * 5 + (goalMode.value === "heritage" ? 3 : goalMode.value === "emergency" ? 8 : 5);
    const connected = components(edges) === 1;
    const ok = connected && pair.cost <= budgetCap;
    plan = {duplicates: duplicateEdges, odd, total: baseCost + (Number.isFinite(pair.cost) ? pair.cost : 0), dupCost: Number.isFinite(pair.cost) ? pair.cost : 0, state: connected ? ok ? "可闭合" : "超预算" : "不连通"};
    explain.innerHTML = `<b>邮路补边：</b>奇度路口 ${odd.length} 个：${odd.map(i=>node(i).name).join("、") || "无"}。重复成本 ${plan.dupCost}，预算阈值 ${budgetCap}。${ok ? "方案可形成闭合巡检。" : "需要提高预算或解除封闭。"}`;
    render();
  }
  function simulateFailure() {
    const options = ["2-3","4-7","0-7"];
    failedKey = options[Math.floor(Math.random() * options.length)];
    failMode.value = failedKey;
    generatePlan();
  }
  function clearFailure() { failedKey = "none"; failMode.value = "none"; generatePlan(); }
  function showTip(html, x, y) { tooltip.innerHTML = html; tooltip.style.display = "block"; tooltip.style.left = x + "px"; tooltip.style.top = y + "px"; }
  function hideTip() { tooltip.style.display = "none"; }
  function renderList(edges) {
    const dupSet = new Set(plan.duplicates.map(key));
    edgeList.innerHTML = edges.map(e => {
      const cls = e.failed ? "failed" : dupSet.has(key(e)) ? "duplicate" : "tree";
      return `<div class="edge-row ${cls}"><span>${node(e.u).name} - ${node(e.v).name}</span><b>${e.w}</b></div>`;
    }).join("");
    oddMetric.textContent = plan.odd.length;
    dupMetric.textContent = plan.dupCost;
    totalMetric.textContent = plan.total;
    stateMetric.textContent = plan.state;
  }
  function render() {
    budgetText.textContent = budget.value;
    const edges = activeEdges();
    const dupSet = new Set(plan.duplicates.map(key));
    const oddSet = new Set(plan.odd);
    renderList(edges);
    svg.innerHTML = "";
    edges.forEach(e => {
      const a=node(e.u), b=node(e.v), k=key(e);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", a.x); line.setAttribute("y1", a.y); line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
      line.setAttribute("class", `edge-line ${e.failed ? "failed" : dupSet.has(k) ? "duplicate" : "tree"}`);
      line.addEventListener("click", () => { failedKey = failedKey === k ? "none" : k; failMode.value = failedKey; generatePlan(); });
      svg.appendChild(line);
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", (a.x+b.x)/2); t.setAttribute("y", (a.y+b.y)/2 - 8); t.setAttribute("class", "edge-weight"); t.textContent = e.w;
      svg.appendChild(t);
    });
    nodes.forEach(n => {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("class", `node ${oddSet.has(n.id) ? "odd" : ""}`);
      g.setAttribute("transform", `translate(${n.x},${n.y})`);
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle"); c.setAttribute("r", 28); g.appendChild(c);
      const tx = document.createElementNS("http://www.w3.org/2000/svg", "text"); tx.textContent = n.mark; g.appendChild(tx);
      g.addEventListener("mouseenter", ev => showTip(`<b>${n.name}</b><br>${n.role}<br>${oddSet.has(n.id) ? "奇度路口：需要配对补边" : "偶度路口：可自然进出"}`, ev.clientX + 12, ev.clientY + 12));
      g.addEventListener("mouseleave", hideTip);
      g.addEventListener("pointerdown", ev => { g.setPointerCapture(ev.pointerId); g.dataset.drag = "1"; });
      g.addEventListener("pointermove", ev => {
        if (g.dataset.drag !== "1") return;
        const pt = svg.createSVGPoint(); pt.x = ev.clientX; pt.y = ev.clientY;
        const p = pt.matrixTransform(svg.getScreenCTM().inverse());
        n.x = Math.max(70, Math.min(830, p.x)); n.y = Math.max(90, Math.min(620, p.y)); render();
      });
      g.addEventListener("pointerup", () => { g.dataset.drag = "0"; });
      svg.appendChild(g);
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.setAttribute("x", n.x); label.setAttribute("y", n.y + 36); label.setAttribute("class", "node-label"); label.textContent = n.name;
      svg.appendChild(label);
    });
  }
  document.getElementById("planBtn").addEventListener("click", generatePlan);
  document.getElementById("failBtn").addEventListener("click", simulateFailure);
  document.getElementById("clearBtn").addEventListener("click", clearFailure);
  budget.addEventListener("input", generatePlan);
  failMode.addEventListener("change", () => { failedKey = failMode.value; generatePlan(); });
  goalMode.addEventListener("change", generatePlan);
  generatePlan();
  </script>
  <script src="../../shared/ai-tutor.js" defer></script>
</body>
</html>
