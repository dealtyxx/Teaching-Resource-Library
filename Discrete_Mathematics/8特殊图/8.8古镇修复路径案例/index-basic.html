  <script>
  window.SECTION_META = {
    chapter: "第 8 章 特殊图",
    section: "8.8 古镇修复路径案例",
    title: "古镇街巷一笔巡检 · 基础层",
    layers: [
      { name: "街巷建模", concepts: "街巷为边 / 路口为顶点", task: "把古镇街巷抽象为图。", page: "index-basic.html" },
      { name: "路径规划", concepts: "欧拉遍历 / MST 最省连通", task: "规划遍历或最省成本修复路径。", page: "index.html" },
      { name: "巡检与邮路", concepts: "市政巡检 / 中国邮路", task: "迁移到巡检与最优环游。", page: "index-extend.html" }
    ],
    grounding: "用欧拉图判定古镇街巷能否一笔巡检，理解“边不重不漏”的路径规划思想。",
    steps: [
      { name: "抽象建模", desc: "把路口看成顶点，把街巷看成边。" },
      { name: "奇偶判定", desc: "统计各路口度数，判断是否存在欧拉通路或回路。" },
      { name: "路线演示", desc: "逐步走过每条街巷，验证不重不漏。" },
      { name: "价值迁移", desc: "用科学规划保护古镇肌理，减少重复施工扰动。" }
    ],
    ideology: {
      title: "守护乡愁 · 留住根脉",
      text: "修复古镇要尊重原有街巷肌理。用图论安排巡检和修复顺序，既节约资源，也体现对文化遗产的敬畏。",
      dims: ["文化自信", "绿色修复", "精细治理"]
    }
  };

  const baseNodes = [
    { id:0, name:"东门", role:"游客入口", x:180, y:250, mark:"东" },
    { id:1, name:"鼓楼", role:"核心地标", x:360, y:165, mark:"鼓" },
    { id:2, name:"书院", role:"文脉节点", x:560, y:200, mark:"书" },
    { id:3, name:"石桥", role:"水系过街", x:700, y:350, mark:"桥" },
    { id:4, name:"戏台", role:"公共活动", x:540, y:430, mark:"戏" },
    { id:5, name:"西巷", role:"传统民居", x:300, y:430, mark:"西" },
    { id:6, name:"祠堂", role:"宗族记忆", x:170, y:400, mark:"祠" },
    { id:7, name:"集市", role:"生活街区", x:430, y:340, mark:"市" }
  ];
  const layouts = {
    balanced: [[0,1,3],[1,2,4],[2,3,3],[3,4,5],[4,5,4],[5,6,3],[6,7,4],[7,0,2],[0,2,5],[2,4,3],[4,6,4],[6,0,4],[1,3,3],[3,5,4],[5,7,2],[7,1,3]],
    trail: [[0,1,3],[1,2,4],[2,3,3],[3,4,5],[4,5,4],[5,6,3],[6,7,4],[7,0,2],[0,2,5],[2,4,3],[4,6,4],[6,0,4],[1,3,3],[3,5,4],[5,7,2]],
    broken: [[0,1,3],[1,2,4],[2,3,3],[3,4,5],[4,5,4],[5,6,3],[6,7,4],[7,0,2],[0,2,5],[2,4,3],[4,6,4],[1,3,3],[3,5,4]]
  };
  const closures = { bridge: [2,3], market: [5,7] };
  let nodes = baseNodes.map(n => ({...n}));
  let edges = [];
  let route = [];
  let stepIndex = 0;
  let timer = null;
  let focusEdge = null;
  const svg = document.getElementById("townSvg");
  const edgeList = document.getElementById("edgeList");
  const explain = document.getElementById("explain");
  const tooltip = document.getElementById("tooltip");
  const oddMetric = document.getElementById("oddMetric");
  const walkMetric = document.getElementById("walkMetric");
  const typeMetric = document.getElementById("typeMetric");
  const costMetric = document.getElementById("costMetric");
  const townMode = document.getElementById("townMode");
  const closureMode = document.getElementById("closureMode");

  const key = e => [e.u,e.v].sort((a,b)=>a-b).join("-");
  const node = id => nodes.find(n => n.id === id);
  function currentEdges() {
    const close = closures[closureMode.value];
    return layouts[townMode.value].map(([u,v,w], id) => ({id,u,v,w, blocked: close && key({u,v}) === key({u:close[0], v:close[1]})}));
  }
  function degrees(active) {
    const d = Array(nodes.length).fill(0);
    active.filter(e=>!e.blocked).forEach(e => { d[e.u]++; d[e.v]++; });
    return d;
  }
  function components(active) {
    const parent = nodes.map((_,i)=>i);
    const find = x => parent[x] === x ? x : parent[x] = find(parent[x]);
    const unite = (a,b) => { a=find(a); b=find(b); if(a!==b) parent[b]=a; };
    active.filter(e=>!e.blocked).forEach(e => unite(e.u,e.v));
    return new Set(nodes.filter(n => degrees(active)[n.id] > 0).map(n => find(n.id))).size || 1;
  }
  function eulerType(active) {
    const d = degrees(active), odd = d.map((v,i)=>v%2?i:null).filter(v=>v!==null);
    if (components(active) > 1) return {kind:"不连通", odd, ok:false, d};
    if (odd.length === 0) return {kind:"欧拉回路", odd, ok:true, d};
    if (odd.length === 2) return {kind:"欧拉通路", odd, ok:true, d};
    return {kind:"需补修", odd, ok:false, d};
  }
  function buildRoute(active) {
    const usable = active.filter(e=>!e.blocked);
    const info = eulerType(active);
    if (!info.ok) return [];
    const start = info.odd[0] ?? usable[0]?.u ?? 0;
    const adj = new Map(nodes.map(n => [n.id, []]));
    usable.forEach(e => { adj.get(e.u).push(e); adj.get(e.v).push(e); });
    const used = new Set(), stack = [start], path = [];
    while (stack.length) {
      const v = stack[stack.length - 1];
      const e = adj.get(v).find(x => !used.has(x.id));
      if (e) { used.add(e.id); stack.push(e.u === v ? e.v : e.u); }
      else path.push(stack.pop());
    }
    path.reverse();
    const out = [];
    for (let i=0; i<path.length-1; i++) {
      const e = usable.find(x => !out.some(y=>y.id===x.id) && ((x.u===path[i] && x.v===path[i+1]) || (x.v===path[i] && x.u===path[i+1])));
      if (e) out.push({...e, from:path[i], to:path[i+1]});
    }
    return out;
  }
  function check() {
    edges = currentEdges();
    route = buildRoute(edges);
    stepIndex = 0;
    const info = eulerType(edges);
    const msg = info.ok
      ? `当前图满足${info.kind}条件：奇度路口 ${info.odd.length} 个，可以规划一笔巡检。`
      : `当前图奇度路口 ${info.odd.length} 个或不连通，需要补修/开放街巷后再一笔巡检。`;
    explain.innerHTML = `<b>欧拉判定：</b>${msg}<br>度序列：${info.d.map((x,i)=>node(i).name + "=" + x).join("，")}`;
    render();
  }
  function stepOnce() {
    if (!route.length) check();
    if (!route.length || stepIndex >= route.length) return false;
    stepIndex++;
    const e = route[stepIndex - 1];
    explain.innerHTML = `<b>第 ${stepIndex} 步：</b>从 ${node(e.from).name} 走向 ${node(e.to).name}，完成 ${node(e.u).name}-${node(e.v).name} 巷道巡检。`;
    render();
    return stepIndex < route.length;
  }
  function autoRun() {
    clearInterval(timer);
    if (!route.length || stepIndex >= route.length) check();
    const delay = 1050 - Number(document.getElementById("speed").value) * 8;
    timer = setInterval(() => { if (!stepOnce()) clearInterval(timer); }, Math.max(160, delay));
  }
  function reset() { clearInterval(timer); nodes = baseNodes.map(n=>({...n})); route = []; stepIndex = 0; focusEdge = null; edges = currentEdges(); explain.innerHTML = "<b>操作提示：</b>拖动路口可调整古镇图；点击巷道可标记重点；点击“判定欧拉性”查看奇度路口。"; render(); }
  function showTip(html, x, y) { tooltip.innerHTML = html; tooltip.style.display = "block"; tooltip.style.left = x + "px"; tooltip.style.top = y + "px"; }
  function hideTip() { tooltip.style.display = "none"; }
  function renderList(info) {
    const done = new Set(route.slice(0, stepIndex).map(key));
    const next = route[stepIndex] && key(route[stepIndex]);
    edgeList.innerHTML = edges.map(e => {
      const k = key(e);
      const cls = e.blocked ? "blocked" : done.has(k) ? "done" : next === k ? "hot" : "";
      return `<div class="edge-row ${cls}" data-id="${e.id}"><span>${node(e.u).name} - ${node(e.v).name}</span><b>${e.w}</b></div>`;
    }).join("");
    edgeList.querySelectorAll(".edge-row").forEach(row => row.addEventListener("click", () => { focusEdge = Number(row.dataset.id); render(); }));
    oddMetric.textContent = info.odd.length;
    walkMetric.textContent = `${Math.min(stepIndex, route.length)}/${edges.filter(e=>!e.blocked).length}`;
    typeMetric.textContent = info.kind;
    costMetric.textContent = route.slice(0, stepIndex).reduce((s,e)=>s+e.w,0);
  }
  function render() {
    edges = currentEdges();
    const info = eulerType(edges);
    const odd = new Set(info.odd), done = new Set(route.slice(0, stepIndex).map(key));
    const next = route[stepIndex] && key(route[stepIndex]);
    renderList(info);
    svg.innerHTML = "";
    edges.forEach(e => {
      const a=node(e.u), b=node(e.v), k=key(e);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", a.x); line.setAttribute("y1", a.y); line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
      line.setAttribute("class", `edge-line ${e.blocked ? "blocked" : done.has(k) ? "walked" : next === k || focusEdge === e.id ? "next" : ""}`);
      line.addEventListener("click", () => { focusEdge = e.id; explain.innerHTML = `<b>重点街巷：</b>${a.name} - ${b.name}，修复长度 ${e.w}。`; render(); });
      svg.appendChild(line);
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", (a.x+b.x)/2); t.setAttribute("y", (a.y+b.y)/2 - 8); t.setAttribute("class", "edge-weight"); t.textContent = e.w;
      svg.appendChild(t);
    });
    const currentNode = route[stepIndex - 1]?.to ?? route[0]?.from;
    nodes.forEach(n => {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("class", `node ${odd.has(n.id) ? "odd" : ""} ${currentNode === n.id ? "current" : ""}`);
      g.setAttribute("transform", `translate(${n.x},${n.y})`);
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle"); c.setAttribute("r", 28); g.appendChild(c);
      const tx = document.createElementNS("http://www.w3.org/2000/svg", "text"); tx.textContent = n.mark; g.appendChild(tx);
      g.addEventListener("mouseenter", ev => showTip(`<b>${n.name}</b><br>${n.role}<br>度数：${info.d[n.id]}`, ev.clientX + 12, ev.clientY + 12));
      g.addEventListener("mouseleave", hideTip);
      g.addEventListener("pointerdown", ev => { g.setPointerCapture(ev.pointerId); g.dataset.drag = "1"; });
      g.addEventListener("pointermove", ev => {
        if (g.dataset.drag !== "1") return;
        const pt = svg.createSVGPoint(); pt.x = ev.clientX; pt.y = ev.clientY;
        const p = pt.matrixTransform(svg.getScreenCTM().inverse());
        n.x = Math.max(70, Math.min(830, p.x)); n.y = Math.max(90, Math.min(620, p.y)); render();
      });
      g.addEventListener("pointerup", () => { g.dataset.drag = "0"; });
      svg.appendChild(g);
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.setAttribute("x", n.x); label.setAttribute("y", n.y + 36); label.setAttribute("class", "node-label"); label.textContent = n.name;
      svg.appendChild(label);
    });
  }
  document.getElementById("autoBtn").addEventListener("click", autoRun);
  document.getElementById("stepBtn").addEventListener("click", stepOnce);
  document.getElementById("checkBtn").addEventListener("click", check);
  document.getElementById("resetBtn").addEventListener("click", reset);
  townMode.addEventListener("change", reset);
  closureMode.addEventListener("change", reset);
  reset();
  </script>
  <script src="../../shared/ai-tutor.js" defer></script>
</body>
</html>
