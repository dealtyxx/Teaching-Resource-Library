    <a href="../../index.html" title="返回课程主页" style="

        background:rgba(30,30,40,0.82);color:#fff;
        padding:7px 14px 7px 10px;border-radius:20px;
        font-size:13px;font-family:'Noto Serif SC',serif;
        text-decoration:none;backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 2px 12px rgba(0,0,0,0.35);
        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <h1>红色数理 <span class="highlight">进阶层</span></h1>
                <p class="subtitle">农业传感省能联网 · 监测系统</p>
            </div>

            <div class="controls-wrapper">
                <div class="control-group">
                    <label>监测模式</label>
                    <div class="mode-buttons">
                        <button id="dfsBtn" class="apple-btn primary-btn" aria-label="精准诊断 (DFS)">
                            <span class="icon">🔍</span> 精准诊断 (DFS)
                        </button>
                        <button id="bfsBtn" class="apple-btn secondary-btn" aria-label="全局巡检 (BFS)">
                            <span class="icon">📡</span> 全局巡检 (BFS)
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <button id="resetBtn" class="apple-btn danger-btn" aria-label="重置系统">
                        <span class="icon">🔄</span> 重置系统
                    </button>
                </div>

                <div class="control-group">
                    <label>演示速度</label>
                    <input type="range" id="speed" min="1" max="100" value="50">
                </div>

                <div class="control-group">
                    <label>实时监测数据</label>
                    <div class="info-panel">
                        <p id="statusText">系统待机中...</p>

                        <div class="stats-grid">
                            <div class="stat-item">
                                <span class="stat-label">已扫描节点:</span>
                                <strong id="scannedCount" class="stat-value">0/13</strong>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">异常报警:</span>
                                <strong id="alertCount" class="stat-value safe">0</strong>
                            </div>
                        </div>

                        <div class="log-container">
                            <div class="log-title">系统日志:</div>
                            <div id="systemLog" class="log-content">
                                <!-- Logs will appear here -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="info-box">
                    <h3>💡 新质生产力</h3>
                    <div id="conceptInfo">
                        <p><strong>根树结构:</strong> 模拟"农场-区域-传感器"的层级管理网络。</p>
                        <p><strong>精准诊断(DFS):</strong> 深入分析特定区域，提供针对性决策。</p>
                        <p><strong>全局巡检(BFS):</strong> 快速掌握整体态势，实现科学调度。</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="visualizer-stage">
            <div class="glass-pane">
                <div class="farm-bg"></div>

                <div class="graph-title">
                    <h2>农业物联网拓扑图</h2>
                    <p>Agricultural IoT Topology</p>
                </div>

                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-dot root"></span>
                        <span>指挥中心</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot region"></span>
                        <span>功能区域</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot sensor"></span>
                        <span>传感器</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-line active"></span>
                        <span>数据传输</span>
                    </div>
                </div>

                <div id="decisionPopup" class="decision-popup">
                    <div class="popup-header">
                        <span class="icon">🤖</span> 智能决策建议
                    </div>
                    <div class="popup-content" id="decisionContent">
                        建议内容...
                    </div>
                </div>

                <svg id="graphSvg" width="100%" height="100%">
                    <defs>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="var(--edge-active)" />
                        </marker>
                    </defs>
                    <g id="edgesGroup"></g>
                    <g id="nodesGroup"></g>
                </svg>
            </div>
        </main>
    </div>

    <script src="agriculture-script.js"></script>
