  <script>
  window.SECTION_META = {
    chapter: "第 8 章 特殊图",
    section: "8.12 航天通信网络案例",
    title: "卫星星座拓展 · 鲁棒骨干",
    layers: [
      { name: "测控通信网络", concepts: "顶点 / 带权边 / 连通性", task: "把通信节点抽象为带权图。", page: "aerospace-mst-index-basic.html" },
      { name: "MST 与最短路", concepts: "Kruskal / 最小生成树 / 并查集", task: "构建低成本通信骨干网。", page: "aerospace-mst-index.html" },
      { name: "卫星星座拓展", concepts: "故障 / 冗余 / 鲁棒性", task: "模拟链路失效后的恢复策略。", page: "aerospace-mst-index-extend.html" }
    ],
    ideology: {
      title: "航天报国 · 协同攻关",
      text: "航天通信不只追求一时连通，更追求极端条件下的可靠保障。鲁棒骨干网体现了底线思维、系统观念和协同攻关能力。",
      dims: ["底线思维", "系统韧性", "协同攻关"],
      quote: "面向星辰大海的网络，必须经得起扰动、撑得住任务。"
    }
  };

  const nodes = [
    { id: 0, name: "北京中心", role: "飞控调度中心", x: 450, y: 470, mark: "京" },
    { id: 1, name: "西安中心", role: "卫星测控中心", x: 240, y: 430, mark: "西" },
    { id: 2, name: "天链一号", role: "中继卫星", x: 205, y: 245, mark: "链1" },
    { id: 3, name: "天链二号", role: "中继卫星", x: 695, y: 245, mark: "链2" },
    { id: 4, name: "神舟飞船", role: "载人飞船", x: 360, y: 115, mark: "神" },
    { id: 5, name: "天宫空间站", role: "太空实验平台", x: 540, y: 100, mark: "宫" },
    { id: 6, name: "北斗卫星", role: "导航与授时节点", x: 760, y: 395, mark: "斗" },
    { id: 7, name: "远望测量船", role: "海上测控平台", x: 630, y: 470, mark: "船" }
  ];
  const edges = [
    [0,1,10,12,0.96], [4,5,12,8,0.94], [2,4,15,10,0.91], [3,5,20,9,0.90], [0,7,25,18,0.88],
    [1,7,30,22,0.82], [2,5,35,15,0.86], [3,6,40,12,0.89], [0,2,45,16,0.85], [0,3,50,20,0.80],
    [6,7,55,24,0.78], [1,2,60,26,0.76], [5,6,70,14,0.84], [2,3,42,11,0.87], [1,4,64,19,0.74]
  ].map(([u,v,cost,delay,rel], i) => ({ id: i, u, v, cost, delay, rel }));

  const svg = document.getElementById("networkSvg");
  const edgeList = document.getElementById("edgeList");
  const explain = document.getElementById("explain");
  const tooltip = document.getElementById("tooltip");
  const failureMode = document.getElementById("failureMode");
  const budget = document.getElementById("budget");
  const budgetText = document.getElementById("budgetText");
  const objective = document.getElementById("objective");
  const buildBtn = document.getElementById("buildBtn");
  const failBtn = document.getElementById("failBtn");
  const resetBtn = document.getElementById("resetBtn");
  const connMetric = document.getElementById("connMetric");
  const scoreMetric = document.getElementById("scoreMetric");

  let tree = [];
  let backups = [];
  let repairs = [];
  let failedNode = null;
  let failedEdge = null;
  let drag = null;

  function node(id) { return nodes.find(n => n.id === id); }
  function key(e) { return `${Math.min(e.u,e.v)}-${Math.max(e.u,e.v)}`; }
  function parseKey(k) { return k.split("-").map(Number); }
  function weight(e) {
    if (objective.value === "cost") return e.cost;
    if (objective.value === "delay") return e.delay * 2 + e.cost * 0.25;
    return e.cost * (1.18 - e.rel) + e.delay * 0.6;
  }
  function isFailedEdge(e) { return failedEdge === key(e) || failedNode === e.u || failedNode === e.v; }
  function activeEdges(includeBackups = true) {
    const ids = new Set(tree.map(key).concat(includeBackups ? backups.map(key) : []).concat(repairs.map(key)));
    return edges.filter(e => ids.has(key(e)) && !isFailedEdge(e));
  }
  function components(edgeSet) {
    const live = nodes.filter(n => n.id !== failedNode).map(n => n.id);
    const p = Object.fromEntries(live.map(id => [id,id]));
    function f(x){ while(p[x] !== x){ p[x] = p[p[x]]; x = p[x]; } return x; }
    edgeSet.forEach(e => { if (p[e.u] == null || p[e.v] == null) return; const a=f(e.u), b=f(e.v); if(a!==b) p[b]=a; });
    return new Set(live.map(f)).size;
  }
  function mst(candidateEdges) {
    const p = nodes.map(n => n.id);
    function f(x){ while(p[x] !== x){ p[x] = p[p[x]]; x = p[x]; } return x; }
    const out = [];
    candidateEdges.slice().sort((a,b)=>weight(a)-weight(b)).forEach(e => {
      const a=f(e.u), b=f(e.v);
      if (a !== b) { p[b] = a; out.push(e); }
    });
    return out.slice(0, nodes.length - 1);
  }
  function buildPlan() {
    failedNode = null; failedEdge = null; failureMode.value = "none";
    tree = mst(edges);
    const treeIds = new Set(tree.map(key));
    const extra = edges.filter(e => !treeIds.has(key(e)));
    extra.sort((a,b) => (b.rel - a.rel) || (weight(a) - weight(b)));
    backups = extra.slice(0, Number(budget.value));
    repairs = [];
    explain.innerHTML = `已生成鲁棒方案：青色为基础骨干，紫色为 ${backups.length} 条预留冗余链路。`;
    render();
  }
  function applyFailure() {
    repairs = [];
    const mode = failureMode.value;
    if (mode.startsWith("node:")) { failedNode = Number(mode.split(":")[1]); failedEdge = null; }
    else if (mode.startsWith("edge:")) { failedEdge = mode.split(":")[1]; failedNode = null; }
    else { failedNode = null; failedEdge = null; }

    const before = components(activeEdges(false));
    const after = components(activeEdges(true));
    if (after > 1) {
      const existing = new Set(activeEdges(true).map(key));
      const repair = edges
        .filter(e => !existing.has(key(e)) && !isFailedEdge(e))
        .sort((a,b) => weight(a)-weight(b))
        .find(e => components(activeEdges(true).concat([e])) < after);
      if (repair) repairs.push(repair);
    }
    const finalComp = components(activeEdges(true));
    const target = mode === "none" ? "未设置故障" : mode.startsWith("node:") ? node(failedNode).name + " 节点失效" : mode.slice(5) + " 链路中断";
    explain.innerHTML = `<b>${target}</b>：基础骨干分量数 ${before}，启用备份/修复后分量数 ${finalComp}。`;
    render();
  }
  function score() {
    const live = nodes.length - (failedNode == null ? 0 : 1);
    const comp = components(activeEdges(true));
    const connected = comp === 1;
    const redundancy = backups.length + repairs.length;
    return Math.max(0, Math.round((connected ? 82 : 42) + redundancy * 5 - (failedEdge || failedNode != null ? 8 : 0)));
  }
  function status(e) {
    if (isFailedEdge(e)) return "failed";
    if (repairs.some(x => key(x) === key(e))) return "repair";
    if (tree.some(x => key(x) === key(e))) return "tree";
    if (backups.some(x => key(x) === key(e))) return "backup";
    return "";
  }
  function render() {
    budgetText.textContent = budget.value;
    svg.innerHTML = "";
    edges.forEach(e => {
      const a = node(e.u), b = node(e.v), cls = status(e);
      const line = document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1", a.x); line.setAttribute("y1", a.y);
      line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
      line.setAttribute("class", `edge ${cls}`);
      line.addEventListener("mouseenter", ev => showTip(ev, `<b>${a.name} - ${b.name}</b><br>成本 ${e.cost}，时延 ${e.delay}，可靠度 ${Math.round(e.rel*100)}%`));
      line.addEventListener("mouseleave", hideTip);
      svg.appendChild(line);
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      const rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
      rect.setAttribute("x", mx-17); rect.setAttribute("y", my-9); rect.setAttribute("width",34); rect.setAttribute("height",18); rect.setAttribute("rx",4); rect.setAttribute("class","label-bg");
      svg.appendChild(rect);
      const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
      txt.setAttribute("x",mx); txt.setAttribute("y",my+4); txt.setAttribute("class","edge-label"); txt.textContent=Math.round(weight(e));
      svg.appendChild(txt);
    });
    nodes.forEach(n => {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("class", `node ${failedNode === n.id ? "failed" : ""}`);
      g.setAttribute("transform", `translate(${n.x},${n.y})`);
      g.addEventListener("pointerdown", ev => { drag = n; svg.setPointerCapture(ev.pointerId); });
      g.addEventListener("mouseenter", ev => showTip(ev, `<b>${n.name}</b><br>${n.role}<br>${failedNode === n.id ? "当前节点失效。" : "可拖拽调整布局。"}`));
      g.addEventListener("mouseleave", hideTip);
      const c=document.createElementNS("http://www.w3.org/2000/svg","circle"); c.setAttribute("r",25);
      const icon=document.createElementNS("http://www.w3.org/2000/svg","text"); icon.setAttribute("class","icon"); icon.textContent=n.mark;
      const name=document.createElementNS("http://www.w3.org/2000/svg","text"); name.setAttribute("class","name"); name.setAttribute("y",44); name.textContent=n.name;
      g.append(c,icon,name); svg.appendChild(g);
    });
    renderList();
    const comp = components(activeEdges(true));
    connMetric.textContent = comp === 1 ? "连通" : `${comp}段`;
    scoreMetric.textContent = score();
  }
  function renderList() {
    edgeList.innerHTML = "";
    edges.forEach(e => {
      const row = document.createElement("div");
      row.className = `edge-row ${status(e)}`;
      row.innerHTML = `<span>${node(e.u).name} - ${node(e.v).name}</span><strong>${Math.round(weight(e))}</strong>`;
      row.addEventListener("click", () => {
        failureMode.value = `edge:${key(e)}`;
        applyFailure();
      });
      edgeList.appendChild(row);
    });
  }
  function showTip(ev, html) {
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    tooltip.style.left = `${ev.clientX - svg.getBoundingClientRect().left + 14}px`;
    tooltip.style.top = `${ev.clientY - svg.getBoundingClientRect().top - 12}px`;
  }
  function hideTip() { tooltip.style.display = "none"; }
  svg.addEventListener("pointermove", ev => {
    if (!drag) return;
    const r = svg.getBoundingClientRect();
    drag.x = Math.max(50, Math.min(850, (ev.clientX - r.left) * 900 / r.width));
    drag.y = Math.max(70, Math.min(585, (ev.clientY - r.top) * 620 / r.height));
    render();
  });
  svg.addEventListener("pointerup", () => { drag = null; });

  buildBtn.addEventListener("click", buildPlan);
  failBtn.addEventListener("click", applyFailure);
  resetBtn.addEventListener("click", () => { failureMode.value = "none"; failedNode = null; failedEdge = null; repairs = []; explain.innerHTML = "故障已清除。可以重新选择故障对象或调整冗余预算。"; render(); });
  failureMode.addEventListener("change", applyFailure);
  budget.addEventListener("input", buildPlan);
  objective.addEventListener("change", buildPlan);
  buildPlan();
  </script>
  <script src="../../shared/ai-tutor.js" defer></script>
</body>
</html>
