        display:flex;align-items:center;gap:6px;
        background:rgba(30,30,40,0.82);color:#fff;
        padding:7px 14px 7px 10px;border-radius:20px;
        font-size:13px;font-family:'Noto Serif SC',serif;
        text-decoration:none;backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 2px 12px rgba(0,0,0,0.35);
        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"
       onmouseout="this.style.background='rgba(30,30,40,0.82)'">
        🏠 <span>课程主页</span>
    </a>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <h1>红色数理 <span class="highlight">进阶层</span></h1>
                <p class="subtitle">哈密顿回路探险 · 哈密顿之路</p>
            </div>

            <div class="controls-wrapper">
                <div class="control-group">
                    <label>图类型选择</label>
                    <div class="graph-type-selector">
                        <button class="type-btn active" data-type="hamiltonian-circuit" aria-label="哈密顿回路 访遍所有地点并返回">
                            <span class="icon">🔄</span>
                            <div>
                                <strong>哈密顿回路</strong>
                                <small>访遍所有地点并返回</small>
                            </div>
                        </button>
                        <button class="type-btn" data-type="hamiltonian-path" aria-label="哈密顿通路 访遍所有地点不返回">
                            <span class="icon">📍</span>
                            <div>
                                <strong>哈密顿通路</strong>
                                <small>访遍所有地点不返回</small>
                            </div>
                        </button>
                        <button class="type-btn" data-type="hamiltonian-graph" aria-label="哈密顿图 存在哈密顿回路">
                            <span class="icon">✅</span>
                            <div>
                                <strong>哈密顿图</strong>
                                <small>存在哈密顿回路</small>
                            </div>
                        </button>
                        <button class="type-btn" data-type="non-hamiltonian" aria-label="非哈密顿图 对比学习">
                            <span class="icon">❌</span>
                            <div>
                                <strong>非哈密顿图</strong>
                                <small>对比学习</small>
                            </div>
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label>算法选择</label>
                    <select id="algorithmSelect" class="apple-select">
                        <option value="backtracking">回溯算法 - 深度优先搜索</option>
                        <option value="greedy">贪心算法 - 最近邻居优先</option>
                    </select>
                </div>

                <div class="control-group">
                    <button id="generateBtn" class="apple-btn primary-btn" aria-label="⟳ 生成新图">
                        <span class="icon">⟳</span> 生成新图
                    </button>
                </div>

                <div class="control-group">
                    <label>演示速度</label>
                    <input type="range" id="speed" min="1" max="100" value="50">
                </div>

                <div class="control-group">
                    <label>当前状态</label>
                    <div class="info-panel">
                        <p id="statusText">准备就绪</p>
                        <div class="path-display">
                            <span>访问顺序:</span>
                            <div id="pathList"></div>
                        </div>
                        <div class="stats-row">
                            <div class="stat-item">
                                <span class="stat-label">节点数</span>
                                <span id="nodeCount" class="stat-value">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">已访问</span>
                                <span id="visitedCount" class="stat-value">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="info-box">
                    <h3>💡 革命启示</h3>
                    <div id="conceptInfo">
                        <p><strong>哈密顿回路:</strong> 访问每个革命地点恰好一次,最终回到起点的完整征程。</p>
                        <p><strong>象征意义:</strong> 革命道路要走遍每个地方,深入群众,最终回归人民。</p>
                        <p><strong>与欧拉回路对比:</strong> 欧拉关注"路径"(边),哈密顿关注"地点"(点)。</p>
                    </div>
                </div>
            </div>

            <div class="actions-footer">
                <button id="startBtn" class="apple-btn action-btn" aria-label="开始征程">开始征程</button>
                <button id="resetBtn" class="apple-btn danger-btn" aria-label="重置">重置</button>
            </div>
        </aside>

        <main class="visualizer-stage">
            <div class="glass-pane">
                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-dot" style="background: var(--node-start)"></span>
                        <span>起点</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background: var(--node-visited)"></span>
                        <span>已访问</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background: var(--node-current)"></span>
                        <span>当前位置</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-line" style="background: var(--edge-visited)"></span>
                        <span>征程路径</span>
                    </div>
                </div>
                <svg id="graphSvg" width="100%" height="100%">
                    <g id="edgesGroup"></g>
                    <g id="nodesGroup"></g>
                </svg>
            </div>
        </main>
    </div>
