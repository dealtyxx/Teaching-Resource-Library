<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色数理 - 校验码</title>
    <meta name="description" content="离散数学课程 - 红色数理 - 校验码">

    <link rel="stylesheet" href="checksum.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- 返回主页浮动按钮 (auto-injected) -->
    <a href="../../index.html" title="返回课程主页" style="
        position:fixed;top:14px;left:14px;z-index:9999;
        display:flex;align-items:center;gap:6px;
        background:rgba(30,30,40,0.82);color:#fff;
        padding:7px 14px 7px 10px;border-radius:20px;
        font-size:13px;font-family:'Noto Serif SC',serif;
        text-decoration:none;backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 2px 12px rgba(0,0,0,0.35);
        transition:background .2s;
    " onmouseover="this.style.background='rgba(214,59,29,0.88)'"
       onmouseout="this.style.background='rgba(30,30,40,0.82)'">
        🏠 <span>课程主页</span>
    </a>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <h1>红色数理 <span class="highlight">校验码</span></h1>
                <p class="subtitle">Iron Discipline & Integrity</p>
            </div>

            <div class="controls-wrapper">
                <div class="control-group">
                    <label>指令代码 (Instruction Code)</label>
                    <div class="input-wrapper">
                        <input type="text" id="codeInput" class="apple-input" placeholder="输入6位数字主体码" value="192107"
                            maxlength="6">
                    </div>
                </div>

                <div class="control-group">
                    <label>操作 (Actions)</label>
                    <div class="action-grid">
                        <button id="generateBtn" class="apple-btn action-btn" aria-label="生成校验码">生成校验码</button>
                        <button id="tamperBtn" class="apple-btn warning-btn" disabled aria-label="模拟篡改">模拟篡改</button>
                        <button id="verifyBtn" class="apple-btn success-btn" disabled aria-label="核验指令">核验指令</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>思政解读</label>
                    <div class="info-panel">
                        <h3 id="szTitle">铁的纪律</h3>
                        <p id="szDesc">革命指令的传达必须准确无误（完整性），任何微小的偏差（错误）都可能导致严重的后果。校验码机制象征着严格的纪律审查，确保政令畅通。</p>
                    </div>
                </div>
            </div>

            <div class="actions-footer">
                <button id="resetBtn" class="apple-btn danger-btn" aria-label="重置">重置</button>
            </div>
        </aside>

        <main class="visualizer-stage">
            <div class="glass-pane">
                <div class="stage-header">
                    <h2>ISO 7064 MOD 11-2</h2>
                    <p>纯系统校验码生成与核验</p>
                </div>

                <div class="viz-content">
                    <!-- Code Display Area -->
                    <div id="codeContainer" class="code-container">
                        <!-- Digits will be generated here -->
                    </div>

                    <!-- Calculation Details -->
                    <div id="calcDetails" class="calc-details hidden">
                        <div class="calc-row">
                            <span class="calc-label">递推状态:</span>
                            <span id="sumFormula" class="calc-value"></span>
                        </div>
                        <div class="calc-row">
                            <span class="calc-label">终止状态:</span>
                            <span id="modFormula" class="calc-value"></span>
                        </div>
                        <div class="calc-row">
                            <span class="calc-label">校验字符:</span>
                            <span id="mapFormula" class="calc-value"></span>
                        </div>
                    </div>

                    <!-- Result Stamp -->
                    <div id="resultStamp" class="result-stamp hidden">
                        <div class="stamp-inner">
                            <span id="stampText">核验通过</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="checksum.js"></script>

<!-- 固定底部版权信息 -->
<footer style="
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(135deg, #D63B1D 0%, #B8321A 100%);
    color: white;
    padding: 15px 10px;
    text-align: center;
    box-shadow: 0 -4px 20px rgba(214, 59, 29, 0.25);
    z-index: 9999;
">
    <p style="font-size: 0.9rem; line-height: 1.6; margin: 0; opacity: 0.95;">

        版权所有 ｜ 项目总负责人：谢鑫
    </p>
</footer>


</body>

</html>
